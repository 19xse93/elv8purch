<body>
    <div id="root">
        <div style="text-align: center; color: #64748b; font-family: sans-serif; padding-top: 40vh;">
            <svg class="animate-spin h-10 w-10 mx-auto mb-4 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p style="font-weight: 700; letter-spacing: 0.1em;">INITIALIZING DASHBOARD...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;
        
        // --- Safe Icons Extraction ---
        const safeIcon = (iconName) => {
            return ({ size = 24, className = '' }) => {
                const iconRef = useRef(null);
                useEffect(() => {
                    if (window.lucide && window.lucide.icons[iconName] && iconRef.current) {
                        iconRef.current.innerHTML = `<i data-lucide="${iconName}"></i>`;
                        window.lucide.createIcons({
                            icons: { [iconName]: window.lucide.icons[iconName] },
                            nameAttr: 'data-lucide',
                            attrs: { width: size, height: size, class: className },
                            root: iconRef.current
                        });
                    }
                }, [size, className]);
                return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
            };
        };

        const LayoutDashboard = safeIcon('LayoutDashboard'); const ShoppingCart = safeIcon('ShoppingCart'); const FileText = safeIcon('FileText');
        const AlertCircle = safeIcon('AlertCircle'); const Clock = safeIcon('Clock'); const CheckCircle = safeIcon('CheckCircle');
        const TrendingUp = safeIcon('TrendingUp'); const DollarSign = safeIcon('DollarSign'); const Calendar = safeIcon('Calendar');
        const Building = safeIcon('Building'); const Sparkles = safeIcon('Sparkles'); const Mail = safeIcon('Mail');
        const Loader2 = safeIcon('Loader2'); const X = safeIcon('X'); const Copy = safeIcon('Copy'); const Check = safeIcon('Check');
        const Truck = safeIcon('Truck'); const CalendarDays = safeIcon('CalendarDays'); const Lock = safeIcon('Lock');
        const Plus = safeIcon('Plus'); const Trash2 = safeIcon('Trash2'); const AlertTriangle = safeIcon('AlertTriangle');
        const Activity = safeIcon('Activity'); const Unlock = safeIcon('Unlock'); const User = safeIcon('User');
        const Wallet = safeIcon('Wallet'); const Send = safeIcon('Send'); const Edit3 = safeIcon('Edit3'); const Menu = safeIcon('Menu'); const Filter = safeIcon('Filter');
        const Upload = safeIcon('Upload'); const Download = safeIcon('Download'); const Search = safeIcon('Search'); const Bell = safeIcon('Bell'); const Settings = safeIcon('Settings');

        // --- Firebase Initialization ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyACvR7KEzJs719E0JJtFiDpiZk0kHYnQyE",
            authDomain: "elev8-be0f4.firebaseapp.com",
            projectId: "elev8-be0f4",
            storageBucket: "elev8-be0f4.firebasestorage.app",
            messagingSenderId: "939507136986",
            appId: "1:939507136986:web:8a8d417cbbc80921eda8e3"
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'my-procurement-app-v2';
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const TODAY = new Date(); 
        TODAY.setHours(0,0,0,0);

        // --- Helpers ---
        const callGeminiAPI = async (prompt, userApiKey = "") => {
            const apiKey = userApiKey || "";
            // Use the public model if a custom key is provided, otherwise use the Canvas internal model
            const modelName = apiKey ? "gemini-2.5-flash" : "gemini-2.5-flash-preview-09-2025";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: "You are an expert financial analyst and accounts payable manager." }] }
            };

            let retries = 5;
            let delay = 1000;
            let lastError = "";

            while (retries > 0) {
                try {
                    const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    
                    if (!response.ok) {
                        let errMessage = `HTTP ${response.status}`;
                        try {
                            const errData = await response.json();
                            if (errData.error && errData.error.message) errMessage += ` - ${errData.error.message}`;
                        } catch (e) {}
                        throw new Error(errMessage);
                    }
                    
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "No response generated.";
                } catch (error) {
                    console.error("AI Generation Error:", error);
                    lastError = error.message;
                    retries--;
                    if (retries === 0) {
                        if (lastError.includes('403')) {
                            return "Failed: API Key Required (HTTP 403).\n\nIt looks like you are running this dashboard locally or the automated proxy is restricted.\n\nPlease click the 'Settings' button in the bottom left sidebar and enter your own Gemini API Key to enable AI features.";
                        }
                        return `Failed to generate AI content.\n\nDiagnostic Error: ${lastError}\n\nPlease try again in a moment.`;
                    }
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }
            }
        };

        const formatCurrency = (amount) => new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP' }).format(amount);

        const getAgingCategory = (dueDate, status) => {
            if (status === 'Paid') return 'Paid';
            const due = new Date(dueDate);
            const diffTime = TODAY - due;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            if (diffDays <= 0) return 'Current';
            if (diffDays <= 30) return '1-30 Days';
            if (diffDays <= 60) return '31-60 Days';
            if (diffDays <= 90) return '61-90 Days';
            return '> 90 Days';
        };

        const getAgingColor = (category) => {
            switch (category) {
                case 'Current': return 'bg-emerald-100 text-emerald-800 border-emerald-200';
                case '1-30 Days': return 'bg-yellow-100 text-yellow-800 border-yellow-200';
                case '31-60 Days': return 'bg-orange-100 text-orange-800 border-orange-200';
                case '61-90 Days': return 'bg-red-100 text-red-800 border-red-200';
                case '> 90 Days': return 'bg-rose-600 text-white border-rose-700';
                case 'Paid': return 'bg-gray-100 text-gray-600 border-gray-200';
                default: return 'bg-gray-100 text-gray-800';
            }
        };

        const getAgingBgColor = (category) => {
            switch (category) {
                case 'Current': return 'bg-emerald-500';
                case '1-30 Days': return 'bg-yellow-400';
                case '31-60 Days': return 'bg-orange-500';
                case '61-90 Days': return 'bg-red-500';
                case '> 90 Days': return 'bg-rose-700';
                default: return 'bg-gray-300';
            }
        };

        const getDaysDiff = (startStr, endStr) => {
            if (!startStr || !endStr) return null;
            const s = new Date(startStr); const e = new Date(endStr);
            s.setHours(0,0,0,0); e.setHours(0,0,0,0);
            return Math.round((e - s) / (1000 * 60 * 60 * 24));
        };

        const getDeliveryStatus = (expectedDelivery, receivedDate) => {
            if (receivedDate) {
                const expected = new Date(expectedDelivery);
                const received = new Date(receivedDate);
                return received <= expected 
                ? { label: 'Received', color: 'bg-emerald-100 text-emerald-800 border-emerald-200' } 
                : { label: 'Received (Late)', color: 'bg-amber-100 text-amber-800 border-amber-200' };
            }
            const expected = new Date(expectedDelivery);
            const diffTime = Math.ceil((TODAY - expected) / (1000 * 60 * 60 * 24));
            if (diffTime > 0) return { label: `Delayed (${diffTime} days)`, color: 'bg-rose-100 text-rose-800 border-rose-200' };
            return { label: 'Pending Delivery', color: 'bg-blue-100 text-blue-800 border-blue-200' };
        };

        // Custom lightweight CSV Parser
        const parseCSV = (text) => {
            const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
            if (lines.length < 2) return [];
            
            const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
            const result = [];
            
            for (let i = 1; i < lines.length; i++) {
                const currentline = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const obj = {};
                for (let j = 0; j < headers.length; j++) {
                    let val = currentline[j] ? currentline[j].trim().replace(/^"|"$/g, '') : '';
                    obj[headers[j]] = val;
                }
                result.push(obj);
            }
            return result;
        };

        // --- App Component ---
        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            
            const [user, setUser] = useState(null);
            const [purchases, setPurchases] = useState([]);
            const [apvs, setApvs] = useState([]);
            const [isDataLoading, setIsDataLoading] = useState(true);

            const [selectedBU, setSelectedBU] = useState('All');
            const [accessLevel, setAccessLevel] = useState(0); // 0: View, 1: Edit PO, 2: Add PO/APV, 3: Super Admin
            const [showAdminLogin, setShowAdminLogin] = useState(false);
            const [adminPassword, setAdminPassword] = useState('');
            const [adminError, setAdminError] = useState(false);

            const [insights, setInsights] = useState(null);
            const [isGeneratingInsights, setIsGeneratingInsights] = useState(false);
            const [emailModalOpen, setEmailModalOpen] = useState(false);
            const [currentEmailDraft, setCurrentEmailDraft] = useState('');
            const [isDraftingEmail, setIsDraftingEmail] = useState(false);
            const [copySuccess, setCopySuccess] = useState(false);

            // Modals
            const [isPoModalOpen, setIsPoModalOpen] = useState(false);
            const [isApvModalOpen, setIsApvModalOpen] = useState(false);
            const [isReceiveModalOpen, setIsReceiveModalOpen] = useState(false);
            const [isClearModalOpen, setIsClearModalOpen] = useState(false);
            const [isClearing, setIsClearing] = useState(false);
            const [isImportModalOpen, setIsImportModalOpen] = useState(false);
            const [isSettingsModalOpen, setIsSettingsModalOpen] = useState(false);

            // Forms Data
            const [customApiKey, setCustomApiKey] = useState('');
            const [selectedPo, setSelectedPo] = useState(null);
            const [editingPoId, setEditingPoId] = useState(null);
            const [newPo, setNewPo] = useState({ id: '', businessUnit: 'ETMC', processorName: '', prReceivedDate: '', date: '', expectedDelivery: '', receivedDate: '', vendor: '', description: '', amount: '' });
            const [newApv, setNewApv] = useState({ id: '', poId: '', businessUnit: 'ETMC', vendor: '', invoiceDate: '', dueDate: '', amount: '', funded: false, settledDate: '', paymentTerms: 'Terms', status: 'Unpaid' });
            const [editingApvId, setEditingApvId] = useState(null);
            const [receiveDate, setReceiveDate] = useState('');
            const [isPayApvModalOpen, setIsPayApvModalOpen] = useState(false);
            const [selectedApvToPay, setSelectedApvToPay] = useState(null);
            const [settleDate, setSettleDate] = useState('');

            // Search States
            const [poSearchQuery, setPoSearchQuery] = useState('');
            const [apvSearchQuery, setApvSearchQuery] = useState('');
            
            // Filter States
            const [poStatusFilter, setPoStatusFilter] = useState('All');
            const [apvStatusFilter, setApvStatusFilter] = useState('All');

            // Import States
            const [importType, setImportType] = useState('purchases');
            const [importFile, setImportFile] = useState(null);
            const [importingStatus, setImportingStatus] = useState('');

            const getDbRef = () => firebase.firestore().collection('artifacts').doc(appId).collection('public').doc('data');

            useEffect(() => {
                let unsubscribe = () => {};
                const initAuth = async () => {
                    try {
                        let currentUser = firebase.auth().currentUser;
                        if (!currentUser) {
                            if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
                                const cred = await firebase.auth().signInWithCustomToken(window.__initial_auth_token);
                                currentUser = cred.user;
                            } else {
                                const cred = await firebase.auth().signInAnonymously();
                                currentUser = cred.user;
                            }
                        }
                    } catch (error) { console.error("Auth failed:", error); }
                };
                initAuth().then(() => {
                    unsubscribe = firebase.auth().onAuthStateChanged((u) => setUser(u));
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const dbRef = getDbRef();
                
                const unsubPurchases = dbRef.collection('purchases').onSnapshot(
                    (snapshot) => {
                        const loadedData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setPurchases(loadedData.sort((a, b) => a.id.localeCompare(b.id)));
                    },
                    (error) => console.warn("Firestore listener error (purchases):", error)
                );

                const unsubApvs = dbRef.collection('apvs').onSnapshot(
                    (snapshot) => {
                        const loadedData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setApvs(loadedData.sort((a, b) => a.id.localeCompare(b.id)));
                        setIsDataLoading(false);
                    },
                    (error) => console.warn("Firestore listener error (apvs):", error)
                );

                return () => { unsubPurchases(); unsubApvs(); };
            }, [user]);

            const filteredPurchases = useMemo(() => {
                return purchases.filter(p => {
                    const matchBU = selectedBU === 'All' || p.businessUnit === selectedBU;
                    const matchSearch = poSearchQuery === '' || 
                                        (p.id && p.id.toLowerCase().includes(poSearchQuery.toLowerCase())) || 
                                        (p.vendor && p.vendor.toLowerCase().includes(poSearchQuery.toLowerCase())) || 
                                        (p.processorName && p.processorName.toLowerCase().includes(poSearchQuery.toLowerCase()));
                    const matchStatus = poStatusFilter === 'All' || p.status === poStatusFilter;
                    return matchBU && matchSearch && matchStatus;
                });
            }, [purchases, selectedBU, poSearchQuery, poStatusFilter]);

            const filteredApvs = useMemo(() => {
                return apvs.filter(a => {
                    const matchBU = selectedBU === 'All' || a.businessUnit === selectedBU;
                    const matchSearch = apvSearchQuery === '' || 
                                        (a.id && a.id.toLowerCase().includes(apvSearchQuery.toLowerCase())) ||
                                        (a.vendor && a.vendor.toLowerCase().includes(apvSearchQuery.toLowerCase()));
                    const matchStatus = apvStatusFilter === 'All' || a.status === apvStatusFilter;
                    return matchBU && matchSearch && matchStatus;
                });
            }, [apvs, selectedBU, apvSearchQuery, apvStatusFilter]);

            const { totalPurchases, pendingDeliveriesCount, totalOutstanding, agingSummary, vendorAging, avgProcessingTime, onTimeRate, weeklyNeedToPay, endOfWeek } = useMemo(() => {
                let tPurchases = filteredPurchases.reduce((sum, p) => sum + Number(p.amount), 0);
                let pDeliveries = filteredPurchases.filter(p => !p.receivedDate).length;
                let tOutstanding = 0;
                
                const startOfWeek = new Date(TODAY); 
                startOfWeek.setDate(TODAY.getDate() - TODAY.getDay()); 
                startOfWeek.setHours(0,0,0,0);
                const endOfCurrentWeek = new Date(startOfWeek); 
                endOfCurrentWeek.setDate(startOfWeek.getDate() + 6); 
                endOfCurrentWeek.setHours(23, 59, 59, 999);

                let totalProcessingDays = 0, processedCount = 0, onTimeCount = 0, receivedCount = 0;

                filteredPurchases.forEach(p => {
                    if (p.prReceivedDate && p.date) {
                        const diff = getDaysDiff(p.prReceivedDate, p.date);
                        if (diff !== null && diff >= 0) { totalProcessingDays += diff; processedCount++; }
                    }
                    if (p.receivedDate && p.expectedDelivery) {
                        receivedCount++;
                        const diff = getDaysDiff(p.expectedDelivery, p.receivedDate);
                        if (diff !== null && diff <= 0) { onTimeCount++; }
                    }
                });

                const summary = { 'Current': 0, '1-30 Days': 0, '31-60 Days': 0, '61-90 Days': 0, '> 90 Days': 0 };
                const weeklyNeed = { 'Current': 0, '1-30 Days': 0, '31-60 Days': 0, '61-90 Days': 0, '> 90 Days': 0, total: 0 };
                const vAging = {};

                filteredApvs.forEach(apv => {
                    const amt = Number(apv.amount || 0);
                    if (apv.status === 'Unpaid') {
                        tOutstanding += amt;
                        const category = getAgingCategory(apv.dueDate, apv.status);
                        if (summary[category] !== undefined) summary[category] += amt;
                        
                        const dueDateObj = new Date(apv.dueDate);
                        if (dueDateObj <= endOfCurrentWeek) {
                            if (weeklyNeed[category] !== undefined) weeklyNeed[category] += amt;
                            weeklyNeed.total += amt;
                        }
                        if (!vAging[apv.vendor]) vAging[apv.vendor] = { name: apv.vendor, total: 0, 'Current': 0, '1-30 Days': 0, '31-60 Days': 0, '61-90 Days': 0, '> 90 Days': 0 };
                        vAging[apv.vendor].total += amt;
                        vAging[apv.vendor][category] += amt;
                    }
                });

                return { 
                    totalPurchases: tPurchases, pendingDeliveriesCount: pDeliveries, totalOutstanding: tOutstanding, 
                    agingSummary: summary, vendorAging: Object.values(vAging).sort((a, b) => b.total - a.total),
                    avgProcessingTime: processedCount > 0 ? (totalProcessingDays / processedCount).toFixed(1) : 0,
                    onTimeRate: receivedCount > 0 ? ((onTimeCount / receivedCount) * 100).toFixed(0) : 0,
                    weeklyNeedToPay: weeklyNeed, endOfWeek: endOfCurrentWeek
                };
            }, [filteredPurchases, filteredApvs]);

            const openPayModal = (apv) => { setSelectedApvToPay(apv); setSettleDate(TODAY.toISOString().split('T')[0]); setIsPayApvModalOpen(true); };

            const handlePayApv = async (e) => {
                e.preventDefault();
                if (!user || accessLevel < 3 || !selectedApvToPay) return;
                await getDbRef().collection('apvs').doc(selectedApvToPay.id).update({ status: 'Paid', settledDate: settleDate });
                setIsPayApvModalOpen(false); setSelectedApvToPay(null); setSettleDate('');
            };

            const openEditPo = (po) => { 
                setEditingPoId(po.id); 
                setNewPo({ ...po, businessUnit: po.businessUnit || 'ETMC', receivedDate: po.receivedDate || '', amount: po.amount.toString() }); 
                setIsPoModalOpen(true); 
            };

            const openEditApv = (apv) => { 
                setEditingApvId(apv.id); 
                setNewApv({ ...apv, businessUnit: apv.businessUnit || 'ETMC', amount: apv.amount.toString(), paymentTerms: apv.paymentTerms || 'Terms', status: apv.status || 'Unpaid', settledDate: apv.settledDate || TODAY.toISOString().split('T')[0] }); 
                setIsApvModalOpen(true); 
            };

            const openReceiveModal = (po) => { 
                setSelectedPo(po); 
                setReceiveDate(TODAY.toISOString().split('T')[0]); 
                setIsReceiveModalOpen(true); 
            };

            // AI Email Drafting Functions
            const draftAgingReportEmail = async () => {
                setEmailModalOpen(true); setIsDraftingEmail(true); setCurrentEmailDraft(''); setCopySuccess(false);
                const dataSummary = `Total Outstanding: ${formatCurrency(totalOutstanding)}\nCurrent: ${formatCurrency(agingSummary['Current'])}\n1-30 Days: ${formatCurrency(agingSummary['1-30 Days'])}\n31-60 Days: ${formatCurrency(agingSummary['31-60 Days'])}\n61-90 Days: ${formatCurrency(agingSummary['61-90 Days'])}\nOver 90 Days: ${formatCurrency(agingSummary['> 90 Days'])}`;
                const prompt = `Write a professional internal memo/email to the Management or Finance Director summarizing our Accounts Payable Aging Report based on the following data:\n${dataSummary}\nProvide a brief overview and highlight the critical over-90-days amount. Keep it professional, concise, and under 150 words. Do not include a subject line. Sign the email as the Purchasing Team.`;
                const result = await callGeminiAPI(prompt, customApiKey);
                setCurrentEmailDraft(result); setIsDraftingEmail(false);
            };

            const draftNoApvEmail = async (po) => {
                setEmailModalOpen(true); setIsDraftingEmail(true); setCurrentEmailDraft(''); setCopySuccess(false);
                const prompt = `Write a professional internal email to the purchasing processor (${po.processorName || 'Team'}) regarding Purchase Order ${po.id} for ${po.vendor}. The PO has been created and may already be received, but no Accounts Payable Voucher (APV) has been logged for it yet. Ask them to urgently process the APV so we can schedule the payment and avoid delays. Keep it under 100 words. Do not include a subject line. Sign the email as the Purchasing Team.`;
                const result = await callGeminiAPI(prompt, customApiKey);
                setCurrentEmailDraft(result); setIsDraftingEmail(false);
            };

            const draftDeliveryFollowUpEmail = async (po) => {
                setEmailModalOpen(true); setIsDraftingEmail(true); setCurrentEmailDraft(''); setCopySuccess(false);
                const expectedDate = new Date(po.expectedDelivery).toLocaleDateString();
                const prompt = `Write a professional email to our vendor, ${po.vendor}, following up on the delivery of Purchase Order ${po.id}. The expected delivery date was ${expectedDate}, and it is currently delayed. Ask for a status update and a revised delivery schedule. Keep it polite but firm, under 100 words. Do not include a subject line. Sign the email as the Purchasing Team.`;
                const result = await callGeminiAPI(prompt, customApiKey);
                setCurrentEmailDraft(result); setIsDraftingEmail(false);
            };

            const draftPaymentNotification = async (apv) => {
                setEmailModalOpen(true); setIsDraftingEmail(true); setCurrentEmailDraft(''); setCopySuccess(false);
                const prompt = `Write a professional payment advice email to ${apv.vendor}. Inform them that the payment for APV reference ${apv.id} (PO Ref: ${apv.poId}) amounting to ${formatCurrency(apv.amount)} has been successfully settled on ${apv.settledDate || 'the requested date'}. Keep it polite, professional, and under 100 words. Do not include a subject line. Sign the email as the Purchasing Team.`;
                const result = await callGeminiAPI(prompt, customApiKey);
                setCurrentEmailDraft(result); setIsDraftingEmail(false);
            };

            const draftVendorEmail = async (vendorData) => {
                setEmailModalOpen(true); setIsDraftingEmail(true); setCurrentEmailDraft(''); setCopySuccess(false);
                const vendorSummary = `Vendor: ${vendorData.name}\nTotal Due: ${formatCurrency(vendorData.total)}\nCurrent: ${formatCurrency(vendorData['Current'])}\n1-30 Days: ${formatCurrency(vendorData['1-30 Days'])}\n31-60 Days: ${formatCurrency(vendorData['31-60 Days'])}\n61-90 Days: ${formatCurrency(vendorData['61-90 Days'])}\nOver 90 Days: ${formatCurrency(vendorData['> 90 Days'])}`;

                        for (let item of parsedData) {

                            <p className="text-xs md:text-sm text-gray-500 mt-1">As of {TODAY.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}</p>
                        </div>
                        <button onClick={draftAgingReportEmail} className="bg-indigo-600 text-white px-3 py-2 rounded-lg text-xs font-medium flex items-center justify-center w-full md:w-auto hover:bg-indigo-700 transition-colors">
                            <Mail size={16} className="mr-2" /> Draft Report Email
                        </button>
                    </div>
                    <div className="p-4 md:p-6 border-b border-gray-100 bg-slate-50">
                        <h4 className="text-xs md:text-sm font-semibold text-gray-900 mb-3 md:mb-4 flex items-center"><AlertCircle size={16} className="mr-2 text-indigo-600 shrink-0" /><span>Weekly Requirements <span className="hidden sm:inline">(Due by {endOfWeek.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })})</span></span></h4>
                        <div className="grid grid-cols-1 lg:grid-cols-4 gap-4 md:gap-6">
                            <div className="bg-white p-4 md:p-5 rounded-xl border border-gray-200 shadow-sm flex flex-col justify-center relative overflow-hidden">
                                <div className="text-[10px] md:text-xs text-gray-500 font-medium uppercase tracking-wider mb-1">Total Needed</div><div className="text-xl md:text-2xl font-bold text-gray-900 break-all">{formatCurrency(weeklyNeedToPay.total)}</div>
                            </div>
                            <div className="lg:col-span-3 bg-white p-4 md:p-5 rounded-xl border border-gray-200 shadow-sm">
                                <div className="text-[10px] md:text-xs text-gray-500 font-medium uppercase tracking-wider mb-3">Requirement by Category</div>
                                {weeklyNeedToPay.total === 0 ? (<div className="text-xs md:text-sm text-gray-400 py-2">No payments required for this week.</div>) : (
                                    <div>
                                        <div className="flex h-3 md:h-4 w-full rounded-full overflow-hidden bg-gray-100 mb-3">
                                            {['> 90 Days', '61-90 Days', '31-60 Days', '1-30 Days', 'Current'].map(category => {
                                                const amount = weeklyNeedToPay[category]; if (amount === 0) return null;
                                                const percentage = ((amount / weeklyNeedToPay.total) * 100).toFixed(2);
                                                return (<div key={`bar-${category}`} style={{ width: `${percentage}%` }} className={`${getAgingBgColor(category)} transition-all`} title={`${category}: ${formatCurrency(amount)}`} />);
                                            })}
                                        </div>
                                        <div className="grid grid-cols-2 xs:grid-cols-3 sm:grid-cols-5 gap-2">
                                            {['> 90 Days', '61-90 Days', '31-60 Days', '1-30 Days', 'Current'].map(category => (
                                                <div key={`legend-${category}`} className="text-left"><div className="flex items-center space-x-1.5 mb-0.5"><div className={`w-1.5 h-1.5 md:w-2 md:h-2 rounded-full ${getAgingBgColor(category)}`}></div><span className="text-[9px] md:text-[10px] font-semibold text-gray-600 uppercase tracking-tighter truncate">{category}</span></div><p className={`text-[10px] md:text-xs font-bold truncate ${weeklyNeedToPay[category] > 0 ? 'text-gray-900' : 'text-gray-400'}`} title={formatCurrency(weeklyNeedToPay[category])}>{formatCurrency(weeklyNeedToPay[category])}</p></div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                    <div className="overflow-x-auto w-full">
                        <table className="w-full text-right border-collapse min-w-[800px]">
                            <thead><tr className="bg-white border-b border-gray-200 text-[10px] uppercase tracking-wider text-gray-500"><th className="p-3 md:p-4 font-semibold text-left">Vendor</th><th className="p-3 md:p-4 font-semibold text-emerald-700 bg-emerald-50/50">Current</th><th className="p-3 md:p-4 font-semibold text-yellow-700 bg-yellow-50/50">1-30 Days</th><th className="p-3 md:p-4 font-semibold text-orange-700 bg-orange-50/50">31-60 Days</th><th className="p-3 md:p-4 font-semibold text-red-700 bg-red-50/50">61-90 Days</th><th className="p-3 md:p-4 font-semibold text-rose-700 bg-rose-50/50">&gt; 90 Days</th><th className="p-3 md:p-4 font-semibold bg-gray-50">Total</th></tr></thead>
                            <tbody className="divide-y divide-gray-100">
                                {vendorAging.length === 0 ? (<tr><td colSpan="8" className="p-8 text-center text-sm text-gray-500">No outstanding balances.</td></tr>) : (
                                    vendorAging.map((v, i) => (
                                        <tr key={i} className="hover:bg-gray-50 transition-colors group text-xs md:text-sm"><td className="p-3 md:p-4 font-medium text-gray-900 text-left flex items-center max-w-[150px] truncate" title={v.name}><Building size={14} className="text-gray-400 mr-1.5 shrink-0" /><span className="truncate">{v.name}</span></td><td className={`p-3 md:p-4 ${v['Current'] > 0 ? 'text-gray-900 font-medium' : 'text-gray-300'}`}>{formatCurrency(v['Current'])}</td><td className={`p-3 md:p-4 ${v['1-30 Days'] > 0 ? 'text-gray-900 font-medium' : 'text-gray-300'}`}>{formatCurrency(v['1-30 Days'])}</td><td className={`p-3 md:p-4 ${v['31-60 Days'] > 0 ? 'text-gray-900 font-medium' : 'text-gray-300'}`}>{formatCurrency(v['31-60 Days'])}</td><td className={`p-3 md:p-4 ${v['61-90 Days'] > 0 ? 'text-gray-900 font-medium' : 'text-gray-300'}`}>{formatCurrency(v['61-90 Days'])}</td><td className={`p-3 md:p-4 ${v['> 90 Days'] > 0 ? 'text-rose-600 font-bold' : 'text-gray-300'}`}>{formatCurrency(v['> 90 Days'])}</td><td className="p-3 md:p-4 font-bold text-gray-900 bg-gray-50/50 group-hover:bg-gray-100/50 transition-colors">{formatCurrency(v.total)}</td></tr>
                                    ))
                                )}
                            </tbody>
                            <tfoot className="bg-gray-50 font-bold border-t-2 border-gray-200 text-xs md:text-sm"><tr><td className="p-3 md:p-4 text-left text-gray-900">TOTAL</td><td className="p-3 md:p-4 text-emerald-700">{formatCurrency(agingSummary['Current'])}</td><td className="p-3 md:p-4 text-yellow-700">{formatCurrency(agingSummary['1-30 Days'])}</td><td className="p-3 md:p-4 text-orange-700">{formatCurrency(agingSummary['31-60 Days'])}</td><td className="p-3 md:p-4 text-red-700">{formatCurrency(agingSummary['61-90 Days'])}</td><td className="p-3 md:p-4 text-rose-700">{formatCurrency(agingSummary['> 90 Days'])}</td><td className="p-3 md:p-4 text-gray-900 text-sm md:text-base">{formatCurrency(totalOutstanding)}</td></tr></tfoot>
                        </table>
                    </div>
                </div>
            );

            return (
                <div className="flex h-screen bg-gray-50 font-sans text-gray-900 overflow-hidden relative">

                        <nav className="flex-1 px-4 space-y-2 mt-2">
                            <button onClick={() => handleTabSwitch('dashboard')} className={`w-full flex items-center px-4 py-3 rounded-lg ${activeTab === 'dashboard' ? 'bg-blue-600 text-white' : 'hover:bg-slate-800'}`}><LayoutDashboard className="mr-3" size={20} /> Dashboard</button>
                            <button onClick={() => handleTabSwitch('purchases')} className={`w-full flex items-center px-4 py-3 rounded-lg ${activeTab === 'purchases' ? 'bg-blue-600 text-white' : 'hover:bg-slate-800'}`}><ShoppingCart className="mr-3" size={20} /> Purchase Orders</button>
                            <button onClick={() => handleTabSwitch('apvs')} className={`w-full flex items-center px-4 py-3 rounded-lg ${activeTab === 'apvs' ? 'bg-blue-600 text-white' : 'hover:bg-slate-800'}`}><FileText className="mr-3" size={20} /> APV Records</button>
                            <button onClick={() => handleTabSwitch('aging')} className={`w-full flex items-center px-4 py-3 rounded-lg ${activeTab === 'aging' ? 'bg-blue-600 text-white' : 'hover:bg-slate-800'}`}><Clock className="mr-3" size={20} /> Aging Report</button>
                        </nav>
                        <div className="p-6 bg-slate-950 mt-auto">

                                    <button onClick={() => setIsImportModalOpen(true)} className="w-full flex items-center justify-center px-4 py-2 mb-2 bg-emerald-600/20 hover:bg-emerald-600/40 text-emerald-400 rounded-lg text-sm transition-colors"><Download size={16} className="mr-2" /> Import Data (CSV)</button>
                                    <button onClick={() => setIsClearModalOpen(true)} className="w-full flex items-center justify-center px-4 py-2 mb-2 bg-slate-800 hover:bg-red-900/50 hover:text-red-400 text-slate-400 rounded-lg text-sm transition-colors"><Trash2 size={16} className="mr-2" /> Clear All Data</button>
                                </>
                            )}
                            
                            <button onClick={() => setIsSettingsModalOpen(true)} className="w-full flex items-center justify-center px-4 py-2 mb-2 bg-slate-800 hover:bg-slate-700 text-slate-400 rounded-lg text-sm transition-colors"><Settings size={16} className="mr-2" /> Settings</button>
                            
                            {accessLevel > 0 ? (
                                <button onClick={() => setAccessLevel(0)} className="w-full flex items-center justify-center px-4 py-2 mb-4 bg-slate-800 rounded-lg text-sm transition-colors"><Lock size={16} className="mr-2" /> Lock Dashboard</button>
                            ) : (
                                <button onClick={() => setShowAdminLogin(true)} className="w-full flex items-center justify-center px-4 py-2 mb-4 bg-indigo-600 rounded-lg text-sm text-white font-bold tracking-tight">Admin Login</button>
                            )}
                            <div className="text-xs text-slate-500 uppercase font-semibold mb-1">System Date</div>
                            <div className="text-sm font-medium text-slate-300 flex items-center truncate"><Calendar size={14} className="mr-2"/> {TODAY.toLocaleDateString()}</div>
                        </div>
                    </aside>

                                <button className="md:hidden mr-3" onClick={() => setIsMobileMenuOpen(true)}><Menu size={24} /></button>
                                <h2 className="text-lg md:text-2xl font-bold text-gray-800 capitalize truncate hidden xs:block">{activeTab}</h2>
                            </div>
                            <div className="flex items-center space-x-2 md:space-x-4">
                                {renderHeaderBadge()}
                                <select value={selectedBU} onChange={e => setSelectedBU(e.target.value)} className="bg-white border border-gray-300 text-[10px] md:text-sm font-medium rounded-lg p-2 outline-none">
                                    <option value="All">All Business Units</option><option value="ETMC">ETMC</option><option value="EMI">EMI</option><option value="EHI">EHI</option>
                                </select>
                            </div>
                        </header>
                        <div className="p-4 md:p-8 max-w-7xl mx-auto w-full flex-1">
                            {activeTab === 'dashboard' && renderDashboard()}
                            {activeTab === 'purchases' && renderPurchases()}
                            {activeTab === 'apvs' && renderAPVs()}
                            {activeTab === 'aging' && renderAgingReport()}
                        </div>

                    {isSettingsModalOpen && (

                                <div className="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                                    <h3 className="font-semibold text-gray-900 flex items-center"><Settings size={18} className="mr-2 text-indigo-600"/> System Settings</h3>
                                    <button onClick={() => setIsSettingsModalOpen(false)} className="text-gray-400 hover:text-gray-600"><X size={20} /></button>
                                </div>
                                <div className="p-6 space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold text-gray-700 uppercase tracking-wide mb-2">Gemini API Key</label>
                                        <input 
                                            type="password" 
                                            placeholder="AIzaSy..." 
                                            value={customApiKey} 
                                            onChange={e => setCustomApiKey(e.target.value)} 
                                            className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" 
                                        />
                                        <p className="text-[10px] text-gray-500 mt-2 leading-relaxed">Required only if you are running this file locally and receiving a HTTP 403 error during AI generation.</p>
                                    </div>
                                    <div className="pt-2 flex justify-end">
                                        <button onClick={() => setIsSettingsModalOpen(false)} className="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-bold transition-colors">Done</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {showAdminLogin && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6 space-y-4">
                                <h3 className="font-bold text-gray-900 text-lg flex items-center"><Unlock size={18} className="mr-2 text-indigo-600"/> Authorization Login</h3>
                                <p className="text-xs text-gray-500">Enter your assigned passcode to elevate your access permissions.</p>
                                
                                <input type="password" autoFocus placeholder="Passcode" value={adminPassword} onChange={e => {setAdminPassword(e.target.value); setAdminError(false);}} className={`w-full px-3 py-3 border rounded-lg focus:outline-none ${adminError ? 'border-red-500' : 'border-gray-300'}`} />
                                <div className="flex justify-end space-x-3"><button onClick={() => setShowAdminLogin(false)} className="px-4 py-2 text-sm font-medium text-gray-500">Cancel</button><button onClick={handleAdminLoginSubmit} className="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-bold">Login</button></div>
                            </div>
                        </div>
                    )}

                    {/* Import CSV Modal */}
                    {isImportModalOpen && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 animate-in fade-in">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden flex flex-col">
                                <div className="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50"><h3 className="font-semibold text-gray-900 flex items-center"><Download size={18} className="mr-2 text-emerald-600"/> Import Data (CSV)</h3><button onClick={() => { setIsImportModalOpen(false); setImportingStatus(''); }} className="text-gray-400 hover:text-gray-600"><X size={20} /></button></div>
                                <form onSubmit={handleImportSubmit} className="p-6 space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold text-gray-700 uppercase tracking-wide mb-2">1. Select Data Type</label>
                                        <select value={importType} onChange={e => setImportType(e.target.value)} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-white">
                                            <option value="purchases">Purchase Orders</option>
                                            <option value="apvs">APV Records</option>
                                        </select>
                                    </div>
                                    
                                    <div className="bg-blue-50 border border-blue-100 p-3 rounded-lg">
                                        <label className="block text-[10px] font-bold text-blue-800 uppercase tracking-wide mb-1 flex items-center"><AlertCircle size={12} className="mr-1"/> Required CSV Headers</label>
                                        <p className="text-xs text-blue-700 font-mono break-all">
                                            {importType === 'purchases' 
                                                ? "id, businessUnit, prReceivedDate, date, expectedDelivery, receivedDate, vendor, description, amount, processorName" 
                                                : "id, poId, businessUnit, vendor, invoiceDate, dueDate, amount, paymentTerms, status, settledDate"}
                                        </p>
                                        <p className="text-[10px] text-blue-600 mt-1 italic">Note: Dates must be formatted as YYYY-MM-DD.</p>
                                    </div>

                                    <div>
                                        <label className="block text-xs font-bold text-gray-700 uppercase tracking-wide mb-2">2. Upload File</label>
                                        <input required type="file" accept=".csv" onChange={e => setImportFile(e.target.files[0])} className="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100" />
                                    </div>

                                    {importingStatus && (
                                        <div className={`p-3 rounded-lg text-xs font-medium text-center ${importingStatus.includes('Error') ? 'bg-red-50 text-red-600' : 'bg-emerald-50 text-emerald-700'}`}>
                                            {importingStatus}
                                        </div>
                                    )}

                                    <div className="pt-4 flex justify-end space-x-3"><button type="button" onClick={() => { setIsImportModalOpen(false); setImportingStatus(''); }} className="px-4 py-2 text-sm font-medium text-gray-500">Cancel</button><button type="submit" disabled={!!importingStatus && !importingStatus.includes('Error')} className="px-4 py-2 bg-emerald-600 text-white rounded-lg text-sm font-bold disabled:opacity-50 flex items-center"><Upload size={16} className="mr-2"/> Import</button></div>
                                </form>
                            </div>
                        </div>
                    )}

                    {isApvModalOpen && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">

                                <div className="flex justify-between items-center mb-6"><h3 className="font-black text-xl text-slate-800 uppercase tracking-tighter">{editingApvId ? 'Edit APV Record' : 'Register New APV'}</h3><button onClick={() => setIsApvModalOpen(false)} className="text-gray-400"><X size={20}/></button></div>
                                <form onSubmit={handleAddApv} className="space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-[10px] uppercase font-bold text-gray-500">APV Number</label><input required readOnly={!!editingApvId} value={newApv.id} onChange={e => setNewApv({...newApv, id: e.target.value})} className={`w-full px-3 py-2 border rounded-lg text-sm ${editingApvId ? 'bg-gray-100 border-gray-200 cursor-not-allowed' : 'border-gray-200'}`} /></div>
                                        <div><label className="text-[10px] uppercase font-bold text-gray-500">PO Ref</label><input required value={newApv.poId} onChange={e => {
                                            const val = e.target.value;
                                            const matched = purchases.find(p => p.id === val);
                                            setNewApv({...newApv, poId: val, ...(matched ? {vendor: matched.vendor, businessUnit: matched.businessUnit, amount: matched.amount.toString()} : {})});
                                        }} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" /></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-[10px] uppercase font-bold text-gray-500">Vendor</label><input required value={newApv.vendor} onChange={e => setNewApv({...newApv, vendor: e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" /></div>
                                        <div><label className="text-[10px] uppercase font-bold text-gray-500">Business Unit</label><select value={newApv.businessUnit} onChange={e => setNewApv({...newApv, businessUnit: e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm"><option value="ETMC">ETMC</option><option value="EMI">EMI</option><option value="EHI">EHI</option></select></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-[10px] uppercase font-bold text-gray-500">Invoice Date</label><input required type="date" value={newApv.invoiceDate} onChange={e => setNewApv({...newApv, invoiceDate: e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" /></div>
                                        <div><label className="text-[10px] uppercase font-bold text-gray-500">Due Date</label><input required type="date" value={newApv.dueDate} onChange={e => setNewApv({...newApv, dueDate: e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" /></div>
                                    </div>
                                    <div><label className="text-[10px] uppercase font-bold text-gray-500">Billed Amount (₱)</label><input required type="number" step="0.01" value={newApv.amount} onChange={e => setNewApv({...newApv, amount: e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" /></div>
                                    <div className="flex gap-2 pt-4"><button type="button" onClick={() => setIsApvModalOpen(false)} className="flex-1 py-3 bg-gray-100 text-gray-600 rounded-xl font-bold text-xs uppercase tracking-widest">Cancel</button><button type="submit" className="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg shadow-blue-200">Save APV</button></div>
                                </form>
                            </div>
                        </div>
                    )}

                    {isPoModalOpen && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">

                                <div className="flex justify-between items-center mb-6"><h3 className="font-black text-xl text-slate-800 uppercase tracking-tighter">{editingPoId ? 'Edit Purchase Order' : 'New Purchase Order'}</h3><button onClick={() => setIsPoModalOpen(false)} className="text-gray-400"><X size={20}/></button></div>
                                <form onSubmit={handleAddPo} className="space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-[10px] uppercase font-bold text-gray-500">PO Number</label><input required readOnly={!!editingPoId} value={newPo.id} onChange={e => setNewPo({...newPo, id: e.target.value})} className={`w-full px-3 py-2 border rounded-lg text-sm ${editingPoId ? 'bg-gray-100 border-gray-200 cursor-not-allowed' : 'border-gray-200'}`} /></div>
                                        <div><label className="text-[10px] uppercase font-bold text-gray-500">Vendor</label><input required value={newPo.vendor} onChange={e => setNewPo({...newPo, vendor: e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" /></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-[10px] uppercase font-bold text-gray-500">PR Received Date</label><input required type="date" value={newPo.prReceivedDate} onChange={e => setNewPo({...newPo, prReceivedDate: e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" /></div>
                                        <div><label className="text-[10px] uppercase font-bold text-gray-500">PO Issue Date</label><input required type="date" value={newPo.date} onChange={e => setNewPo({...newPo, date: e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" /></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-[10px] uppercase font-bold text-gray-500">Expected Delivery</label><input required type="date" value={newPo.expectedDelivery} onChange={e => setNewPo({...newPo, expectedDelivery: e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" /></div>
                                        <div><label className="text-[10px] uppercase font-bold text-gray-500">Business Unit</label><select value={newPo.businessUnit} onChange={e => setNewPo({...newPo, businessUnit: e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm"><option value="ETMC">ETMC</option><option value="EMI">EMI</option><option value="EHI">EHI</option></select></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-[10px] uppercase font-bold text-gray-500">Amount (₱)</label><input required type="number" step="0.01" value={newPo.amount} onChange={e => setNewPo({...newPo, amount: e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" /></div>
                                        <div><label className="text-[10px] uppercase font-bold text-gray-500">Actual Received Date <span className="text-gray-400 font-normal lowercase">(Optional)</span></label><input type="date" value={newPo.receivedDate || ''} onChange={e => setNewPo({...newPo, receivedDate: e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" /></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-[10px] uppercase font-bold text-gray-500">Processor</label><input required type="text" value={newPo.processorName || ''} onChange={e => setNewPo({...newPo, processorName: e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" placeholder="e.g., Alex Reyes" /></div>
                                        <div><label className="text-[10px] uppercase font-bold text-gray-500">Description</label><input required type="text" value={newPo.description || ''} onChange={e => setNewPo({...newPo, description: e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" placeholder="Brief description" /></div>
                                    </div>
                                    <div className="flex gap-2 pt-4"><button type="button" onClick={() => setIsPoModalOpen(false)} className="flex-1 py-3 bg-gray-100 text-gray-600 rounded-xl font-bold text-xs uppercase tracking-widest">Cancel</button><button type="submit" className="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg shadow-blue-200">Save PO</button></div>
                                </form>
                            </div>
                        </div>
                    )}

                    {isPayApvModalOpen && selectedApvToPay && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 animate-in fade-in duration-200">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden flex flex-col">
                                <div className="px-4 md:px-6 py-3 md:py-4 border-b border-emerald-100 flex justify-between items-center bg-emerald-50"><h3 className="font-semibold text-emerald-900 text-sm md:text-base">Process APV Payment</h3><button onClick={() => setIsPayApvModalOpen(false)} className="text-emerald-600 hover:text-emerald-800"><X size={20} /></button></div>
                                <form onSubmit={handlePayApv} className="p-4 md:p-6 space-y-4">
                                    <div className="text-sm text-gray-600 mb-2">Settling payment for <strong>{selectedApvToPay.id}</strong> to {selectedApvToPay.vendor}.</div>
                                    <div className="text-2xl font-bold text-gray-900 mb-4">{formatCurrency(selectedApvToPay.amount)}</div>
                                    <div><label className="block text-xs font-medium text-gray-700 mb-1">Date Settled</label><input required type="date" value={settleDate} onChange={e => setSettleDate(e.target.value)} className="w-full px-3 py-2.5 md:py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" /></div>
                                    <div className="pt-2 md:pt-4 flex flex-col-reverse xs:flex-row justify-end xs:space-x-3"><button type="button" onClick={() => setIsPayApvModalOpen(false)} className="w-full xs:w-auto px-4 py-2.5 md:py-2 mt-2 xs:mt-0 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">Cancel</button><button type="submit" className="w-full xs:w-auto px-4 py-2.5 md:py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg text-sm font-medium transition-colors">Confirm</button></div>
                                </form>
                            </div>
                        </div>
                    )}

                    {isReceiveModalOpen && selectedPo && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 animate-in fade-in duration-200">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden flex flex-col">
                                <div className="px-4 md:px-6 py-3 md:py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50"><h3 className="font-semibold text-gray-900 text-sm md:text-base">Mark PO as Received</h3><button onClick={() => setIsReceiveModalOpen(false)} className="text-gray-400 hover:text-gray-600"><X size={20} /></button></div>
                                <form onSubmit={handleReceivePo} className="p-4 md:p-6 space-y-4">
                                    <div className="text-sm text-gray-600 mb-4">Confirming receipt for <strong>{selectedPo.id}</strong> from {selectedPo.vendor}.</div>
                                    <div><label className="block text-xs font-medium text-gray-700 mb-1">Date Received</label><input required type="date" value={receiveDate} onChange={e => setReceiveDate(e.target.value)} className="w-full px-3 py-2.5 md:py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" /></div>
                                    <div className="pt-2 md:pt-4 flex flex-col-reverse xs:flex-row justify-end xs:space-x-3"><button type="button" onClick={() => setIsReceiveModalOpen(false)} className="w-full xs:w-auto px-4 py-2.5 md:py-2 mt-2 xs:mt-0 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">Cancel</button><button type="submit" className="w-full xs:w-auto px-4 py-2.5 md:py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-medium transition-colors">Confirm</button></div>
                                </form>
                            </div>
                        </div>
                    )}

                    {emailModalOpen && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4 animate-in fade-in">
                            <div className="bg-white rounded-[2rem] md:rounded-[3rem] p-6 md:p-10 w-full max-w-2xl shadow-2xl flex flex-col max-h-[90vh]">
                                <div className="flex justify-between items-center mb-6 shrink-0"><h3 className="text-lg md:text-2xl font-black tracking-tight text-slate-800 flex items-center"><Mail size={24} className="mr-3 text-indigo-600" /> Draft Email</h3><button type="button" onClick={() => setEmailModalOpen(false)} className="text-slate-400 hover:text-slate-600 bg-slate-100 p-2 rounded-full"><X size={18}/></button></div>
                                <div className="flex-1 overflow-y-auto mb-6 bg-slate-50 rounded-2xl p-6 border border-slate-100">{isDraftingEmail ? (<div className="flex flex-col items-center justify-center py-12 text-indigo-600"><Loader2 size={32} className="animate-spin mb-4" /><p className="font-bold uppercase tracking-widest text-xs">Writing email...</p></div>) : (<div className="text-slate-700 whitespace-pre-wrap text-sm leading-relaxed">{currentEmailDraft}</div>)}</div>
                                <div className="flex gap-3 md:gap-4 shrink-0"><button onClick={() => setEmailModalOpen(false)} className="flex-1 py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold uppercase text-[10px] md:text-xs tracking-widest transition-all hover:bg-slate-200">Close</button><button disabled={isDraftingEmail} onClick={handleCopy} className="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-bold uppercase text-[10px] md:text-xs tracking-widest shadow-xl shadow-indigo-200 transition-all hover:bg-indigo-700 flex justify-center items-center">{copySuccess ? <Check size={16} className="mr-2" /> : <Copy size={16} className="mr-2" />}{copySuccess ? 'Copied!' : 'Copy Text'}</button></div>
                            </div>
                        </div>
                    )}
                    
                    {isClearModalOpen && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 animate-in fade-in duration-200">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden flex flex-col border-t-4 border-red-500">
                                <div className="px-4 md:px-6 py-3 md:py-4 border-b border-gray-100 flex justify-between items-center bg-red-50"><h3 className="font-semibold text-red-800 flex items-center text-sm md:text-base"><AlertTriangle size={18} className="mr-2" /> Warning</h3><button onClick={() => setIsClearModalOpen(false)} className="text-red-400 hover:text-red-600"><X size={20} /></button></div>
                                <div className="p-4 md:p-6 space-y-4 text-center"><p className="text-sm md:text-base text-gray-700">Are you sure you want to permanently delete all Purchase Orders and APV records?</p><p className="text-xs md:text-sm text-gray-500">This action cannot be undone.</p></div>
                                <div className="px-4 md:px-6 py-3 md:py-4 bg-gray-50 flex flex-col-reverse xs:flex-row justify-end xs:space-x-3"><button onClick={() => setIsClearModalOpen(false)} disabled={isClearing} className="w-full xs:w-auto px-4 py-2.5 md:py-2 mt-2 xs:mt-0 text-sm font-medium text-gray-600 hover:bg-gray-200 rounded-lg transition-colors">Cancel</button><button onClick={handleClearAllData} disabled={isClearing} className="w-full xs:w-auto px-4 py-2.5 md:py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg text-sm font-medium transition-colors flex items-center justify-center disabled:opacity-50">{isClearing ? <Loader2 size={16} className="animate-spin mr-2" /> : <Trash2 size={16} className="mr-2" />}{isClearing ? 'Deleting...' : 'Delete Data'}</button></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
