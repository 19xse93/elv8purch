<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM (Production) -->

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>

<body class="bg-gray-50">

            projectId: "elev8-be0f4",
            storageBucket: "elev8-be0f4.firebasestorage.app",
            messagingSenderId: "939507136986",
            appId: "1:939507136986:web:8a8d417cbbc80921eda8e3",
            measurementId: "G-C98765TPWP"

        // --- Mock Data ---
        const TODAY = new Date('2026-03-24T00:00:00');

        ];

        // --- Application Logic ---
        function App() {
            // Because we are in an HTML file, we load Firebase via Script tags

            // To use the Firebase SDK in a single HTML, you would use the "compat" or ESM imports.
            
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isAdmin, setIsAdmin] = useState(false);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [showAdminLogin, setShowAdminLogin] = useState(false);
            const [adminPassword, setAdminPassword] = useState('');
            const [adminError, setAdminError] = useState(false);
            const [purchases, setPurchases] = useState(INITIAL_PURCHASES);

            const formatCurrency = (amt) => new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP' }).format(amt);

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (adminPassword === 'admin123') {
                    setIsAdmin(true);
                    setShowAdminLogin(false);
                    setAdminPassword('');
                } else {
                    setAdminError(true);
                }
            };

            return (
                <div className="flex h-screen bg-gray-50 overflow-hidden">
                    {/* Sidebar */}
                    <aside className={`fixed inset-y-0 left-0 z-50 w-64 bg-slate-900 text-slate-300 transform transition-transform duration-300 md:relative md:translate-x-0 ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="p-6 flex justify-between items-center border-b border-slate-800">

                            <button onClick={() => setActiveTab('purchases')} className={`w-full flex items-center px-4 py-3 rounded-lg ${activeTab === 'purchases' ? 'bg-blue-600 text-white' : 'hover:bg-slate-800'}`}>

                        <div className="mt-auto p-6 bg-slate-950">

                                <button onClick={() => setIsAdmin(false)} className="w-full py-2 bg-slate-800 text-slate-400 rounded-lg text-xs font-bold uppercase tracking-wider">Logout</button>

                    <main className="flex-1 flex flex-col overflow-hidden">

                                {isAdmin ? (
                                    <span className="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-[10px] font-bold border border-emerald-100 uppercase">Super User</span>
                                ) : (
                                    <span className="bg-slate-50 text-slate-500 px-3 py-1 rounded-full text-[10px] font-bold border border-slate-200 uppercase">Viewer</span>

                        <div className="p-8 overflow-y-auto">

                                        <p className="text-sm text-gray-500 font-medium">Total Procurement</p>
                                        <h3 className="text-2xl font-bold text-gray-900 mt-1">₱183,000.00</h3>
                                    </div>
                                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">

                                        </div>
                                        <div className="absolute top-0 right-0 p-8 opacity-10"><Database size={160} /></div>
                                    </div>
                                </div>
                            ) : (
                                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden animate-in">
                                    <table className="w-full text-left">
                                        <thead className="bg-gray-50 border-b border-gray-100">

                                                <th className="px-6 py-4">Vendor</th>
                                                <th className="px-6 py-4 text-right">Amount</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-50">
                                            {purchases.map(po => (
                                                <tr key={po.id} className="text-sm text-gray-700 hover:bg-gray-50 transition-colors">
                                                    <td className="px-6 py-4">
                                                        <div className="font-bold text-blue-600">{po.id}</div>
                                                        <div className="text-[10px] text-gray-400">{po.date}</div>
                                                    </td>
                                                    <td className="px-6 py-4 font-medium">{po.vendor}</td>
                                                    <td className="px-6 py-4 text-right font-bold text-gray-900">{formatCurrency(po.amount)}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>

                            )}

                        {/* Login Modal */}
                        {showAdminLogin && (

                                <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden">
                                    <div className="p-8 text-center bg-indigo-50">
                                        <Unlock size={48} className="text-indigo-600 mx-auto mb-4" />
                                        <h3 className="text-xl font-bold text-gray-900">Admin Access</h3>
                                        <p className="text-sm text-gray-500 mt-1">Enter passcode to enable editing</p>
                                    </div>
                                    <form onSubmit={handleAdminLogin} className="p-8 space-y-4">
                                        <input 
                                            type="password" 
                                            autoFocus
                                            value={adminPassword}
                                            onChange={(e) => {setAdminPassword(e.target.value); setAdminError(false);}}

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
