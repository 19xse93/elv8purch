<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProcureDesk | APV Aging Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone@7.23.12/babel.min.js"></script>
    <!-- Firebase SDKs (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <!-- Lucide Icons - Using a specific UMD build to avoid naming conflicts -->
    <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
    <script src="https://unpkg.com/lucide-react@0.344.0/dist/umd/lucide-react.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            background-color: #f8fafc;
        }
        .animate-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        /* Prevent layout shift before React loads */
        #root:empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div id="root">
        <!-- Temporary loading state while JS is parsing -->
        <div style="text-align: center; color: #64748b;">
            <div style="width: 40px; height: 40px; border: 3px solid #e2e8f0; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px;"></div>
            <p style="font-size: 14px; font-weight: 500;">Initializing Dashboard...</p>
        </div>
    </div>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <script type="text/babel" data-presets="react">
        /**
         * BUG FIX: Babel Standalone sometimes conflicts with global identifiers. 
         * We wrap everything in a scope and safely extract the Lucide icons.
         */
        (() => {
            const { useState, useMemo, useEffect } = React;

            // Safe Icon Extraction: Lucide UMD global is 'LucideReact'
            const Icons = window.LucideReact || {};
            
            const { 
                LayoutDashboard, ShoppingCart, FileText, AlertCircle, Clock, 
                CheckCircle, TrendingUp, DollarSign, Calendar, Building, 
                Sparkles, Mail, Loader2, X, Copy, Check, Truck, 
                CalendarDays, Lock, Plus, Trash2, AlertTriangle, Activity, 
                Unlock, User, Wallet, Send, Edit3, Menu, ShieldCheck, Database
            } = Icons;

            // Fallback for missing icons to prevent crash
            const IconPlaceholder = ({ name }) => <div className="w-5 h-5 bg-slate-200 rounded animate-pulse" title={`Missing icon: ${name}`} />;

            // --- Firebase Config (Your project: elev8-be0f4) ---
            const firebaseConfig = {
                apiKey: "AIzaSyACvR7KEzJs719E0JJtFiDpiZk0kHYnQyE",
                authDomain: "elev8-be0f4.firebaseapp.com",
                projectId: "elev8-be0f4",
                storageBucket: "elev8-be0f4.firebasestorage.app",
                messagingSenderId: "939507136986",
                appId: "1:939507136986:web:8a8d417cbbc80921eda8e3",
                measurementId: "G-C98765TPWP"
            };

            // Initialize Firebase once
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            const auth = firebase.auth();
            const db = firebase.firestore();
            const appId = 'my-procurement-app';

            // --- Mock Data ---
            const TODAY = new Date('2026-03-24T00:00:00'); 
            const INITIAL_PURCHASES = [
                { id: 'PO-2026-001', processorName: 'Alex Reyes', prReceivedDate: '2026-02-25', date: '2026-03-01', expectedDelivery: '2026-03-10', receivedDate: '2026-03-09', vendor: 'TechCorp Supplies', description: 'Engineering Laptops', amount: 150000, status: 'Invoiced' },
                { id: 'PO-2026-002', processorName: 'Maria Santos', prReceivedDate: '2026-02-10', date: '2026-02-15', expectedDelivery: '2026-02-25', receivedDate: '2026-02-26', vendor: 'OfficeWorld', description: 'Ergonomic Chairs', amount: 25000, status: 'Invoiced' },
                { id: 'PO-2026-003', processorName: 'Juan Dela Cruz', prReceivedDate: '2026-03-15', date: '2026-03-20', expectedDelivery: '2026-04-05', receivedDate: null, vendor: 'Global Logistics', description: 'Q1 Shipping Retainer', amount: 8000, status: 'Pending' }
            ];

            const INITIAL_APVS = [
                { id: 'APV-26-001', poId: 'PO-2026-001', vendor: 'TechCorp Supplies', invoiceDate: '2026-03-05', dueDate: '2026-04-04', amount: 150000, status: 'Unpaid', funded: true, settledDate: null }, 
                { id: 'APV-26-002', poId: 'PO-2026-002', vendor: 'OfficeWorld', invoiceDate: '2026-02-16', dueDate: '2026-03-18', amount: 25000, status: 'Unpaid', funded: false, settledDate: null }
            ];

            // --- Helpers ---
            const formatCurrency = (amt) => new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP' }).format(amt);
            
            const getAgingCategory = (dueDate, status) => {
                if (status === 'Paid') return 'Paid';
                const due = new Date(dueDate);
                const diffDays = Math.ceil((TODAY.getTime() - due.getTime()) / (1000 * 60 * 60 * 24));
                if (diffDays <= 0) return 'Current';
                if (diffDays <= 30) return '1-30 Days';
                if (diffDays <= 60) return '31-60 Days';
                if (diffDays <= 90) return '61-90 Days';
                return '> 90 Days';
            };

            const getAgingBgColor = (cat) => {
                switch(cat) {
                    case 'Current': return 'bg-emerald-500';
                    case '1-30 Days': return 'bg-yellow-400';
                    case '31-60 Days': return 'bg-orange-500';
                    case '61-90 Days': return 'bg-red-500';
                    case '> 90 Days': return 'bg-rose-700';
                    default: return 'bg-gray-300';
                }
            };

            // --- Main App ---
            function App() {
                const [activeTab, setActiveTab] = useState('dashboard');
                const [user, setUser] = useState(null);
                const [purchases, setPurchases] = useState([]);
                const [apvs, setApvs] = useState([]);
                const [weeklyFund, setWeeklyFund] = useState(5000000);
                const [isAdmin, setIsAdmin] = useState(false);
                const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
                const [isLoading, setIsLoading] = useState(true);
                const [showAdminLogin, setShowAdminLogin] = useState(false);
                const [adminPassword, setAdminPassword] = useState('');

                useEffect(() => {
                    const unsubAuth = auth.onAuthStateChanged(async (u) => {
                        if (!u) {
                            try { await auth.signInAnonymously(); } catch(e) { console.error("Auth Error:", e); }
                        } else {
                            setUser(u);
                        }
                    });
                    return () => unsubAuth();
                }, []);

                useEffect(() => {
                    if (!user) return;

                    const baseRef = db.collection('artifacts').doc(appId).collection('public').doc('data');
                    
                    const unsubP = baseRef.collection('purchases').onSnapshot(snap => {
                        if (snap.empty) {
                            INITIAL_PURCHASES.forEach(p => baseRef.collection('purchases').doc(p.id).set(p));
                        } else {
                            setPurchases(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                        }
                    }, err => console.error("Purchases snapshot error:", err));

                    const unsubA = baseRef.collection('apvs').onSnapshot(snap => {
                        if (snap.empty) {
                            INITIAL_APVS.forEach(a => baseRef.collection('apvs').doc(a.id).set(a));
                        } else {
                            setApvs(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                        }
                        setIsLoading(false);
                    }, err => {
                        console.error("APV snapshot error:", err);
                        setIsLoading(false);
                    });

                    const unsubS = baseRef.collection('settings').doc('treasury').onSnapshot(doc => {
                        if (doc.exists) setWeeklyFund(doc.data().amount);
                        else baseRef.collection('settings').doc('treasury').set({ amount: 5000000 });
                    }, err => console.error("Settings snapshot error:", err));

                    return () => { unsubP(); unsubA(); unsubS(); };
                }, [user]);

                const metrics = useMemo(() => {
                    const totalOutstanding = apvs.reduce((sum, a) => a.status === 'Unpaid' ? sum + Number(a.amount) : sum, 0);
                    const fundedUnpaid = apvs.reduce((sum, a) => (a.status === 'Unpaid' && a.funded) ? sum + Number(a.amount) : sum, 0);
                    
                    const startOfWeek = new Date(TODAY);
                    startOfWeek.setDate(TODAY.getDate() - TODAY.getDay());
                    startOfWeek.setHours(0,0,0,0);
                    
                    const releasedThisWeek = apvs.reduce((sum, a) => {
                        if (a.status === 'Paid' && a.settledDate) {
                            const sDate = new Date(a.settledDate);
                            if (sDate >= startOfWeek) return sum + Number(a.amount);
                        }
                        return sum;
                    }, 0);

                    const aging = { 'Current': 0, '1-30 Days': 0, '31-60 Days': 0, '61-90 Days': 0, '> 90 Days': 0 };
                    apvs.forEach(a => {
                        if (a.status === 'Unpaid') {
                            const cat = getAgingCategory(a.dueDate, a.status);
                            if (aging[cat] !== undefined) aging[cat] += Number(a.amount);
                        }
                    });

                    return { totalOutstanding, fundedUnpaid, releasedThisWeek, aging };
                }, [apvs]);

                const handleLogin = (e) => {
                    e.preventDefault();
                    if (adminPassword === 'admin123') {
                        setIsAdmin(true);
                        setShowAdminLogin(false);
                        setAdminPassword('');
                    } else {
                        alert("Wrong passcode");
                    }
                };

                const handleTabSwitch = (id) => {
                    setActiveTab(id);
                    setIsMobileMenuOpen(false);
                };

                if (isLoading) return (
                    <div className="h-screen flex flex-col items-center justify-center bg-white">
                        <Loader2 className="animate-spin text-blue-600 mb-4" size={40} />
                        <p className="text-slate-500 font-medium tracking-tight">Accessing Project elev8-be0f4...</p>
                    </div>
                );

                return (
                    <div className="flex h-screen bg-gray-50 overflow-hidden">
                        {/* Sidebar */}
                        <aside className={`fixed inset-y-0 left-0 z-50 w-64 bg-slate-900 text-slate-400 transform transition-transform duration-300 md:relative md:translate-x-0 ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                            <div className="p-6 flex justify-between items-center border-b border-slate-800">
                                <h1 className="text-xl font-bold text-white flex items-center">
                                    {TrendingUp ? <TrendingUp className="mr-3 text-blue-500" /> : null} ProcureDesk
                                </h1>
                                <button className="md:hidden" onClick={() => setIsMobileMenuOpen(false)}>{X ? <X /> : '×'}</button>
                            </div>
                            <nav className="p-4 space-y-1">
                                {[
                                    { id: 'dashboard', icon: LayoutDashboard, label: 'Dashboard' },
                                    { id: 'purchases', icon: ShoppingCart, label: 'Purchases' },
                                    { id: 'apvs', icon: FileText, label: 'APV Records' },
                                    { id: 'aging', icon: Clock, label: 'Aging Analysis' }
                                ].map(tab => (
                                    <button 
                                        key={tab.id}
                                        onClick={() => handleTabSwitch(tab.id)}
                                        className={`w-full flex items-center px-4 py-3 rounded-xl transition-all ${activeTab === tab.id ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/20' : 'hover:bg-slate-800 hover:text-slate-200'}`}
                                    >
                                        {tab.icon ? <tab.icon className="mr-3" size={20} /> : <div className="mr-3 w-5" />} {tab.label}
                                    </button>
                                ))}
                            </nav>
                            <div className="mt-auto p-6 bg-slate-950">
                                {!isAdmin ? (
                                    <button onClick={() => setShowAdminLogin(true)} className="w-full py-3 bg-blue-600/10 text-blue-400 border border-blue-900/50 rounded-xl text-xs font-bold uppercase tracking-widest hover:bg-blue-600/20 transition-all flex items-center justify-center">
                                        {Unlock ? <Unlock size={14} className="mr-2" /> : null} Unlock Admin
                                    </button>
                                ) : (
                                    <button onClick={() => setIsAdmin(false)} className="w-full py-3 bg-slate-800 text-slate-400 rounded-xl text-xs font-bold uppercase tracking-widest flex items-center justify-center">
                                        {Lock ? <Lock size={14} className="mr-2" /> : null} Logout
                                    </button>
                                )}
                            </div>
                        </aside>

                        {/* Main */}
                        <main className="flex-1 flex flex-col overflow-hidden w-full">
                            <header className="h-16 md:h-20 bg-white border-b border-gray-100 px-4 md:px-8 flex items-center justify-between sticky top-0 z-20">
                                <div className="flex items-center">
                                    <button className="md:hidden mr-4 text-slate-600" onClick={() => setIsMobileMenuOpen(true)}>{Menu ? <Menu /> : '☰'}</button>
                                    <h2 className="text-lg md:text-xl font-bold text-slate-800 capitalize">{activeTab.replace('-', ' ')}</h2>
                                </div>
                                <div className="flex items-center space-x-3">
                                    <div className="hidden sm:flex flex-col text-right mr-4">
                                        <span className="text-[10px] text-slate-400 font-bold uppercase">System Date</span>
                                        <span className="text-xs font-semibold text-slate-700">{TODAY.toLocaleDateString()}</span>
                                    </div>
                                    {isAdmin ? (
                                        <div className="bg-emerald-50 text-emerald-700 px-3 py-1.5 rounded-lg text-[10px] font-bold border border-emerald-100 uppercase flex items-center">
                                            {ShieldCheck ? <ShieldCheck size={12} className="mr-1.5" /> : null} Super User
                                        </div>
                                    ) : (
                                        <div className="bg-slate-100 text-slate-500 px-3 py-1.5 rounded-lg text-[10px] font-bold border border-slate-200 uppercase flex items-center">
                                            {Lock ? <Lock size={12} className="mr-1.5" /> : null} View Only
                                        </div>
                                    )}
                                </div>
                            </header>

                            <div className="flex-1 overflow-y-auto p-4 md:p-8">
                                <div className="max-w-7xl mx-auto space-y-6 animate-in">
                                    
                                    {activeTab === 'dashboard' && (
                                        <div className="space-y-6">
                                            {/* Treasury Banner */}
                                            <div className="bg-slate-900 rounded-3xl p-6 md:p-8 text-white relative overflow-hidden shadow-2xl">
                                                <div className="relative z-10 flex flex-col md:flex-row justify-between md:items-center gap-6">
                                                    <div className="space-y-1">
                                                        <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest flex items-center">
                                                            {Wallet ? <Wallet size={14} className="mr-2 text-blue-500" /> : null} Designated Weekly Fund
                                                        </p>
                                                        <h3 className="text-3xl font-black tracking-tight">{formatCurrency(weeklyFund)}</h3>
                                                    </div>
                                                    <div className="h-px md:h-12 w-full md:w-px bg-slate-800"></div>
                                                    <div className="space-y-1">
                                                        <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Available Cash</p>
                                                        <h3 className="text-2xl font-bold text-emerald-400">{formatCurrency(weeklyFund - metrics.releasedThisWeek - metrics.fundedUnpaid)}</h3>
                                                    </div>
                                                    <div className="grid grid-cols-2 gap-4">
                                                        <div className="bg-white/5 p-3 rounded-2xl border border-white/10">
                                                            <p className="text-white/40 text-[9px] font-bold uppercase">Released</p>
                                                            <p className="text-sm font-bold">{formatCurrency(metrics.releasedThisWeek)}</p>
                                                        </div>
                                                        <div className="bg-white/5 p-3 rounded-2xl border border-white/10">
                                                            <p className="text-white/40 text-[9px] font-bold uppercase">Earmarked</p>
                                                            <p className="text-sm font-bold text-amber-400">{formatCurrency(metrics.fundedUnpaid)}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                                {Database ? <div className="absolute top-0 right-0 p-8 opacity-5"><Database size={200} /></div> : null}
                                            </div>

                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                                    <div className="flex items-center justify-between mb-6">
                                                        <h4 className="font-bold text-slate-800">Aging Distribution</h4>
                                                        {Activity ? <Activity size={18} className="text-slate-400" /> : null}
                                                    </div>
                                                    <div className="space-y-4">
                                                        <div className="flex h-6 w-full rounded-xl overflow-hidden bg-slate-100">
                                                            {Object.keys(metrics.aging).map(cat => (
                                                                <div 
                                                                    key={cat}
                                                                    style={{ width: `${(metrics.aging[cat] / (metrics.totalOutstanding || 1)) * 100}%` }}
                                                                    className={`${getAgingBgColor(cat)} transition-all`}
                                                                />
                                                            ))}
                                                        </div>
                                                        <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                                                            {Object.keys(metrics.aging).map(cat => (
                                                                <div key={cat} className="space-y-1">
                                                                    <div className="flex items-center text-[10px] text-slate-500 font-bold uppercase tracking-tighter">
                                                                        <div className={`w-2 h-2 rounded-full mr-1.5 ${getAgingBgColor(cat)}`}></div>
                                                                        {cat}
                                                                    </div>
                                                                    <p className="text-xs font-bold text-slate-800">{formatCurrency(metrics.aging[cat])}</p>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                </div>
                                                
                                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex flex-col justify-center text-center space-y-4">
                                                    <div className="p-4 bg-indigo-50 text-indigo-600 rounded-full w-fit mx-auto">
                                                        {Sparkles ? <Sparkles size={24} /> : null}
                                                    </div>
                                                    <div>
                                                        <h4 className="font-bold text-slate-800">Operational Health</h4>
                                                        <p className="text-sm text-slate-500 mt-1">System is monitoring {purchases.length} active POs and {apvs.length} payables.</p>
                                                    </div>
                                                    <button onClick={() => setActiveTab('aging')} className="text-indigo-600 text-xs font-bold uppercase tracking-widest hover:underline">View Full Analysis</button>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {activeTab === 'purchases' && (
                                        <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                                            <div className="overflow-x-auto">
                                                <table className="w-full text-left">
                                                    <thead className="bg-slate-50/50 border-b border-slate-100">
                                                        <tr className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                                                            <th className="px-6 py-4">Reference</th>
                                                            <th className="px-6 py-4">Vendor</th>
                                                            <th className="px-6 py-4">Timeline</th>
                                                            <th className="px-6 py-4 text-right">Amount</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-slate-50">
                                                        {purchases.map(po => (
                                                            <tr key={po.id} className="hover:bg-slate-50/50 transition-colors">
                                                                <td className="px-6 py-4">
                                                                    <div className="font-bold text-blue-600 text-sm">{po.id}</div>
                                                                    <div className="text-[10px] text-slate-400 mt-0.5">{po.description}</div>
                                                                </td>
                                                                <td className="px-6 py-4 font-semibold text-slate-700 text-sm">{po.vendor}</td>
                                                                <td className="px-6 py-4">
                                                                    <div className="text-[10px] font-bold text-slate-500 uppercase tracking-tight">Due {po.expectedDelivery}</div>
                                                                    <div className={`text-[10px] mt-0.5 ${po.receivedDate ? 'text-emerald-600 font-bold' : 'text-amber-500 font-medium italic'}`}>
                                                                        {po.receivedDate ? 'Received' : 'Pending Delivery'}
                                                                    </div>
                                                                </td>
                                                                <td className="px-6 py-4 text-right font-black text-slate-900 text-sm">{formatCurrency(po.amount)}</td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    )}

                                    {activeTab === 'apvs' && (
                                        <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                                            <div className="overflow-x-auto">
                                                <table className="w-full text-left">
                                                    <thead className="bg-slate-50/50 border-b border-slate-100">
                                                        <tr className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                                                            <th className="px-6 py-4">APV Number</th>
                                                            <th className="px-6 py-4">Vendor</th>
                                                            <th className="px-6 py-4 text-center">Funding</th>
                                                            <th className="px-6 py-4 text-right">Amount</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-slate-50">
                                                        {apvs.map(apv => (
                                                            <tr key={apv.id} className="hover:bg-slate-50/50 transition-colors">
                                                                <td className="px-6 py-4 font-bold text-slate-700 text-sm">{apv.id}</td>
                                                                <td className="px-6 py-4">
                                                                    <div className="text-sm font-semibold text-slate-800">{apv.vendor}</div>
                                                                    <div className="text-[10px] text-slate-400">{apv.poId}</div>
                                                                </td>
                                                                <td className="px-6 py-4 text-center">
                                                                    <span className={`px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-tighter ${apv.funded ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-400'}`}>
                                                                        {apv.funded ? 'Funded' : 'Unfunded'}
                                                                    </span>
                                                                </td>
                                                                <td className="px-6 py-4 text-right font-black text-slate-900 text-sm">{formatCurrency(apv.amount)}</td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    )}

                                    {activeTab === 'aging' && (
                                        <div className="space-y-6">
                                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                                    <h4 className="font-bold text-slate-800 mb-6 flex items-center">
                                                        {AlertCircle ? <AlertCircle size={18} className="mr-2 text-rose-500" /> : null} Past Due Summary
                                                    </h4>
                                                    <div className="space-y-4">
                                                        {Object.keys(metrics.aging).filter(c => c !== 'Current').map(cat => (
                                                            <div key={cat} className="flex items-center justify-between">
                                                                <span className="text-xs font-semibold text-slate-500">{cat}</span>
                                                                <span className="text-sm font-black text-slate-900">{formatCurrency(metrics.aging[cat])}</span>
                                                            </div>
                                                        ))}
                                                        <div className="h-px bg-slate-100 my-2"></div>
                                                        <div className="flex items-center justify-between pt-2">
                                                            <span className="text-xs font-bold text-rose-600">Total Delinquent</span>
                                                            <span className="text-lg font-black text-rose-600">
                                                                {formatCurrency(metrics.totalOutstanding - metrics.aging['Current'])}
                                                            </span>
                                                        </div>
                                                    </div>
                                                </div>
                                                
                                                <div className="bg-indigo-50 p-6 rounded-3xl border border-indigo-100 flex flex-col items-center justify-center text-center space-y-3">
                                                    <div className="p-3 bg-indigo-600 text-white rounded-2xl">
                                                        {Mail ? <Mail size={24} /> : null}
                                                    </div>
                                                    <h4 className="font-bold text-indigo-900">Communication Center</h4>
                                                    <p className="text-xs text-indigo-700/60 px-4">AI can draft follow-up emails for your vendors based on aging status.</p>
                                                    <button className="px-6 py-2.5 bg-indigo-600 text-white text-xs font-bold rounded-xl shadow-lg shadow-indigo-200">Open Templates</button>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                </div>
                            </div>

                            {/* Admin Login Modal */}
                            {showAdminLogin && (
                                <div className="fixed inset-0 z-[100] bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4">
                                    <div className="bg-white rounded-[40px] shadow-2xl w-full max-w-sm overflow-hidden animate-in">
                                        <div className="p-10 text-center bg-indigo-50/50">
                                            <div className="w-16 h-16 bg-white rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-indigo-100">
                                                {Unlock ? <Unlock size={32} className="text-indigo-600" /> : null}
                                            </div>
                                            <h3 className="text-2xl font-black text-slate-800 tracking-tight">Access Control</h3>
                                            <p className="text-sm text-slate-400 font-medium mt-2 uppercase tracking-widest">Super User Passcode</p>
                                        </div>
                                        <form onSubmit={handleLogin} className="p-10 space-y-6">
                                            <input 
                                                type="password" 
                                                autoFocus
                                                value={adminPassword}
                                                onChange={(e) => setAdminPassword(e.target.value)}
                                                className="w-full px-6 py-4 rounded-2xl border-2 border-slate-50 bg-slate-50 focus:bg-white focus:border-indigo-500 outline-none transition-all text-center text-lg font-bold"
                                                placeholder="••••"
                                            />
                                            <button className="w-full py-5 bg-slate-900 text-white rounded-2xl font-black text-xs uppercase tracking-[0.2em] shadow-2xl shadow-slate-200 hover:scale-[1.02] active:scale-[0.98] transition-all">Unlock System</button>
                                            <button type="button" onClick={() => setShowAdminLogin(false)} className="w-full text-xs text-slate-400 font-bold uppercase tracking-widest">Cancel</button>
                                        </form>
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>
                );
            }

            // Error boundary equivalent for the render call
            try {
                const root = ReactDOM.createRoot(document.getElementById('root'));
                root.render(<App />);
            } catch (err) {
                console.error("Render error:", err);
                document.getElementById('root').innerHTML = `
                    <div style="padding: 20px; color: #ef4444; text-align: center;">
                        <h3 style="font-weight: 800;">Critical Render Error</h3>
                        <p style="font-size: 12px; margin-top: 8px;">${err.message}</p>
                    </div>
                `;
            }
        })();
    </script>
</body>
</html>
