            return ({ size = 24, className = '', color = 'currentColor' }) => {
                const iconRef = useRef(null);
                
                useEffect(() => {
                    if (window.lucide && window.lucide.icons[iconName] && iconRef.current) {
                        try {
                            const svgElement = window.lucide.createElement(window.lucide.icons[iconName]);
                            svgElement.setAttribute('width', size);
                            svgElement.setAttribute('height', size);
                            svgElement.setAttribute('stroke', color);
                            if (className) svgElement.setAttribute('class', `lucide lucide-${iconName}`); 
                            
                            iconRef.current.innerHTML = '';
                            iconRef.current.appendChild(svgElement);
                        } catch (e) { console.warn("Icon error:", e); }
                    }
                }, [size, className, color]);
                
                return <span ref={iconRef} className={`inline-flex items-center justify-center shrink-0 ${className}`} style={{ width: size, height: size }}></span>;

        const formatCurrency = (amount) => new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP' }).format(amount || 0);

        const standardizeDate = (val) => {
            if (!val || typeof val !== 'string') return '';
            val = val.trim();
            if (!val) return '';
            if (!isNaN(val) && Number(val) > 20000 && Number(val) < 90000) {
                const excelDays = parseFloat(val);
                const d = new Date((excelDays - 25569) * 86400 * 1000);
                if (!isNaN(d.getTime())) return d.toISOString().split('T')[0];
            }
            let d = new Date(val);
            if (isNaN(d.getTime())) {
                const parts = val.split(/[-/.]/); 
                if (parts.length === 3) {
                    d = new Date(`${parts[1]}/${parts[0]}/${parts[2]}`);
                    if (isNaN(d.getTime()) && parts[2].length === 2) d = new Date(`${parts[1]}/${parts[0]}/20${parts[2]}`);
                }
            }
            if (isNaN(d.getTime())) d = new Date(val.replace(/-/g, ' '));
            if (!isNaN(d.getTime())) {
                const year = d.getFullYear();
                if (year < 2000 || year > 2100) return ''; 
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            }
            return ''; 
        };

        const safeParseDate = (dateStr) => {
            if (!dateStr) return null;
            if (!isNaN(dateStr) && !isNaN(parseFloat(dateStr))) {
                const excelDays = parseFloat(dateStr);
                if (excelDays > 20000 && excelDays < 90000) return new Date((excelDays - 25569) * 86400 * 1000);
            }
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return null;
            if (d.getFullYear() < 2000 || d.getFullYear() > 2100) return null;
            return d;
        };

        const formatMonthLabel = (monthStr) => {
            try {
                if (!monthStr || typeof monthStr !== 'string') return 'Unknown';
                const parts = monthStr.split('-');
                if (parts.length < 2) return monthStr;
                const date = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, 1);
                return date.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
            } catch (e) {
                return String(monthStr);
            }
        };

        const getAgingCategory = (dueDate, status) => {
            if (status === 'Paid') return 'Paid';
            const due = safeParseDate(dueDate);
            if (!due) return 'Current'; 
            const diffTime = TODAY - due;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            if (diffDays <= 0) return 'Current';
            if (diffDays <= 30) return '1-30 Days';
            if (diffDays <= 60) return '31-60 Days';
            if (diffDays <= 90) return '61-90 Days';
            return '> 90 Days';
        };

        const getAgingColor = (category) => {
            switch (category) {
                case 'Current': return 'bg-emerald-100 text-emerald-800 border-emerald-200';
                case '1-30 Days': return 'bg-yellow-100 text-yellow-800 border-yellow-200';
                case '31-60 Days': return 'bg-orange-100 text-orange-800 border-orange-200';
                case '61-90 Days': return 'bg-red-100 text-red-800 border-red-200';
                case '> 90 Days': return 'bg-rose-600 text-white border-rose-700';
                case 'Paid': return 'bg-gray-100 text-gray-600 border-gray-200';
                default: return 'bg-gray-100 text-gray-800';
            }
        };

        const getAgingBgColor = (category) => {
            switch (category) {
                case 'Current': return 'bg-emerald-500';
                case '1-30 Days': return 'bg-yellow-400';
                case '31-60 Days': return 'bg-orange-500';
                case '61-90 Days': return 'bg-red-500';
                case '> 90 Days': return 'bg-rose-700';
                default: return 'bg-gray-300';
            }
        };

        const getWeekRange = (dateStr) => {
            const d = safeParseDate(dateStr) || new Date();
            const day = d.getDay();
            const diffToMonday = day === 0 ? -6 : 1 - day;
            const start = new Date(d); start.setDate(d.getDate() + diffToMonday);
            const end = new Date(start); end.setDate(start.getDate() + 4);
            return `${start.toLocaleDateString('en-US', {month:'short', day:'numeric'})} - ${end.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'})}`;
        };

        const getDaysDiff = (startStr, endStr) => {
            const s = safeParseDate(startStr); const e = safeParseDate(endStr);
            if (!s || !e) return null;
            s.setHours(0,0,0,0); e.setHours(0,0,0,0);
            return Math.round((e - s) / (1000 * 60 * 60 * 24));
        };

        const getDeliveryStatus = (expectedDelivery, receivedDate, category) => {
            const expected = safeParseDate(expectedDelivery);
            const isNoDelivery = category === 'Site Rental' || category === 'Services';

            if (!expected) return { label: 'Invalid Date', color: 'bg-rose-100 text-rose-800 border-rose-200' };
            
            if (receivedDate) {
                const received = safeParseDate(receivedDate);
                if (received) {
                    if (isNoDelivery) return { label: 'Completed', color: 'bg-emerald-100 text-emerald-800 border-emerald-200' };
                    return received <= expected ? { label: 'Received', color: 'bg-emerald-100 text-emerald-800 border-emerald-200' } : { label: 'Received (Late)', color: 'bg-amber-100 text-amber-800 border-amber-200' };
                }
            }
            
            const diffTime = Math.ceil((TODAY - expected) / (1000 * 60 * 60 * 24));
            if (diffTime > 0) {
                if (isNoDelivery) return { label: 'Past Target', color: 'bg-rose-100 text-rose-800 border-rose-200' };
                return { label: diffTime > 3650 ? 'Delayed' : `Delayed (${diffTime} days)`, color: 'bg-rose-100 text-rose-800 border-rose-200' };
            }
            
            if (isNoDelivery) return { label: 'Ongoing', color: 'bg-blue-100 text-blue-800 border-blue-200' };
            return { label: 'Pending Delivery', color: 'bg-blue-100 text-blue-800 border-blue-200' };
        };

        const parseCSV = (text) => {
            const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
            if (lines.length < 2) return [];
            const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
            const result = [];
            for (let i = 1; i < lines.length; i++) {
                const currentline = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const obj = {};
                for (let j = 0; j < headers.length; j++) {
                    let val = currentline[j] ? currentline[j].trim().replace(/^"|"$/g, '') : '';
                    obj[headers[j]] = val;
                }
                result.push(obj);
            }
            return result;
        };

        // --- Error Boundary ---
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null, errorInfo: null };
            }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            componentDidCatch(error, errorInfo) { 
                this.setState({ errorInfo }); 
                const loader = document.getElementById('initial-loader');
                if (loader) loader.remove();
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="p-8 bg-red-50 text-red-900 min-h-screen font-sans flex flex-col justify-center w-full">
                            <div className="max-w-4xl mx-auto w-full">

                                <div className="bg-red-100 p-6 rounded-lg overflow-auto border border-red-300 shadow-inner">
                                    <p className="font-bold text-red-700">{this.state.error && this.state.error.toString()}</p>
                                    <pre className="mt-4 text-red-900 text-xs font-mono">{this.state.errorInfo && this.state.errorInfo.componentStack}</pre>
                                </div>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

                        apvs.some(a => a.poId === p.id && ((a.id && String(a.id).toLowerCase().includes(query)) || (a.checkNumber && String(a.checkNumber).toLowerCase().includes(query))));
                    return matchCat && matchMonth && matchSearch;

                    const linkedPo = purchases.find(p => p.id === a.poId);
                    const matchSearch = query === '' || 
                        (a.id && String(a.id).toLowerCase().includes(query)) ||
                        (a.poId && String(a.poId).toLowerCase().includes(query)) ||
                        (a.vendor && String(a.vendor).toLowerCase().includes(query)) ||
                        (a.checkNumber && String(a.checkNumber).toLowerCase().includes(query)) ||
                        (linkedPo && ((linkedPo.remarks && String(linkedPo.remarks).toLowerCase().includes(query)) || (linkedPo.processorName && String(linkedPo.processorName).toLowerCase().includes(query)) || (linkedPo.prRequestor && String(linkedPo.prRequestor).toLowerCase().includes(query))));

            const tabFilteredPurchases = useMemo(() => baseFilteredPurchases.filter(p => poStatusFilter === 'All' || p.status === poStatusFilter), [baseFilteredPurchases, poStatusFilter]);

            const { totalPurchases, totalSavings, totalOutstanding, agingSummary, vendorAging, avgProcessingTime, weeklyNeedToPay, endOfWeek, avgOverallLeadTime, avgOverallVariance, supplierDeliveryList } = useMemo(() => {
                let tPurchases = 0; let tSavings = 0; let tOutstanding = 0;
                
                const currentDay = TODAY.getDay();
                const diffToMonday = currentDay === 0 ? -6 : 1 - currentDay;
                const startOfWeek = new Date(TODAY); 
                startOfWeek.setDate(TODAY.getDate() + diffToMonday); 
                startOfWeek.setHours(0,0,0,0);
                const endOfCurrentWeek = new Date(startOfWeek); 
                endOfCurrentWeek.setDate(startOfWeek.getDate() + 4); 
                endOfCurrentWeek.setHours(23, 59, 59, 999);

                let totalProcessingDays = 0, processedCount = 0;
                let totalDeliveryDays = 0, deliveryCount = 0;
                let totalVarianceDays = 0, varianceCount = 0;
                const vendorDeliveries = {};

                baseFilteredPurchases.forEach(p => {
                    tPurchases += Number(p.amount || 0); tSavings += Number(p.discountAmount || 0);
                    
                    if (p.prReceivedDate && p.date) {
                        const diff = getDaysDiff(p.prReceivedDate, p.date);
                        if (diff !== null && diff >= 0) { totalProcessingDays += diff; processedCount++; }
                    }

                    if (p.receivedDate) {
                        const v = p.vendor || 'Unknown Vendor';
                        if (!vendorDeliveries[v]) vendorDeliveries[v] = { vendor: v, leadTotal: 0, leadCount: 0, needTotal: 0, needCount: 0 };
                        
                        if (p.date) {
                            const leadTime = getDaysDiff(p.date, p.receivedDate);
                            if (leadTime !== null && leadTime >= 0) {
                                totalDeliveryDays += leadTime;
                                deliveryCount++;
                                vendorDeliveries[v].leadTotal += leadTime;
                                vendorDeliveries[v].leadCount++;
                            }
                        }

                        if (p.expectedDelivery) {
                            const needDiff = getDaysDiff(p.expectedDelivery, p.receivedDate);
                            if (needDiff !== null) {
                                totalVarianceDays += needDiff;
                                varianceCount++;
                                vendorDeliveries[v].needTotal += needDiff;
                                vendorDeliveries[v].needCount++;
                            }
                        }
                    }
                });

                const summary = { 'Current': 0, '1-30 Days': 0, '31-60 Days': 0, '61-90 Days': 0, '> 90 Days': 0 };
                const weeklyNeed = { 'Current': 0, '1-30 Days': 0, '31-60 Days': 0, '61-90 Days': 0, '> 90 Days': 0, total: 0 };
                const vAging = {};

                baseFilteredApvs.forEach(apv => {
                    const amt = Number(apv.amount || 0);
                    if (apv.status === 'Unpaid') {
                        tOutstanding += amt;
                        const category = getAgingCategory(apv.dueDate, apv.status);
                        if (summary[category] !== undefined) summary[category] += amt;
                        
                        const dueDateObj = safeParseDate(apv.dueDate) || new Date();
                        if (dueDateObj <= endOfCurrentWeek) {
                            if (weeklyNeed[category] !== undefined) weeklyNeed[category] += amt;
                            weeklyNeed.total += amt;
                        }
                        if (!vAging[apv.vendor]) vAging[apv.vendor] = { name: apv.vendor, total: 0, 'Current': 0, '1-30 Days': 0, '31-60 Days': 0, '61-90 Days': 0, '> 90 Days': 0 };
                        vAging[apv.vendor].total += amt;
                        vAging[apv.vendor][category] += amt;
                    }
                });

                return { 
                    totalPurchases: tPurchases, totalSavings: tSavings,
                    totalOutstanding: tOutstanding, 
                    agingSummary: summary, vendorAging: Object.values(vAging).sort((a, b) => b.total - a.total),
                    avgProcessingTime: processedCount > 0 ? (totalProcessingDays / processedCount).toFixed(1) : 0,
                    weeklyNeedToPay: weeklyNeed, endOfWeek: endOfCurrentWeek,
                    avgOverallLeadTime: deliveryCount > 0 ? Math.round(totalDeliveryDays / deliveryCount) : 0,
                    avgOverallVariance: varianceCount > 0 ? Math.round(totalVarianceDays / varianceCount) : 0,
                    supplierDeliveryList: Object.values(vendorDeliveries)
                        .filter(v => v.leadCount > 0 || v.needCount > 0)

                            vendor: v.vendor,
                            avgLead: v.leadCount > 0 ? Math.round(v.leadTotal / v.leadCount) : null,
                            avgNeed: v.needCount > 0 ? Math.round(v.needTotal / v.needCount) : null,
                            totalOrders: Math.max(v.leadCount, v.needCount)
                        })).sort((a, b) => b.totalOrders - a.totalOrders)

                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 1200; const MAX_HEIGHT = 1200;
                        let width = img.width; let height = img.height;

                        if (width > height && width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } 
                        else if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }

                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 0, width, height);
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.6);

                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden flex flex-col border-t-4 border-red-500">
                                <div className="px-4 md:px-6 py-3 md:py-4 border-b border-gray-100 flex justify-between items-center bg-red-50"><h3 className="font-semibold text-red-800 flex items-center text-sm md:text-base"><AlertTriangle size={18} className="mr-2" /> Reset APV</h3><button onClick={() => setIsResetFundingModalOpen(false)} className="text-red-400 hover:text-red-600"><X size={20} /></button></div>
                                <div className="p-4 md:p-6 space-y-4 text-center"><p className="text-sm md:text-base text-gray-700">Are you sure you want to remove funding and delete all check details for <strong className="whitespace-nowrap">{apvToReset.id}</strong>?</p><p className="text-xs md:text-sm text-gray-500">This will revert the APV to an unfunded, unpaid state.</p></div>
                                <div className="px-4 md:px-6 py-3 md:py-4 bg-gray-50 flex flex-col-reverse xs:flex-row justify-end xs:space-x-3"><button onClick={() => setIsResetFundingModalOpen(false)} className="w-full xs:w-auto px-4 py-2.5 md:py-2 mt-2 xs:mt-0 text-sm font-medium text-gray-600 hover:bg-gray-200 rounded-lg transition-colors">Cancel</button><button onClick={executeResetFunding} className="w-full xs:w-auto px-4 py-2.5 md:py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg text-sm font-medium transition-colors flex items-center justify-center">Remove Data</button></div>
                            </div>
                        </div>
                    )}

                    <datalist id="unpaid-apvs">{apvs.filter(a => a.status === 'Unpaid').map(a => <option key={a.id} value={a.id} />)}</datalist>

                    {isApvModalOpen && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-lg max-h-[90vh] overflow-y-auto p-6 flex flex-col">
                                <div className="flex justify-between items-center mb-6"><h3 className="font-black text-xl text-slate-800 uppercase tracking-tighter">{editingApvId ? 'Edit APV Record' : 'Register New APV'}</h3><button onClick={() => setIsApvModalOpen(false)} className="text-gray-400"><X size={20}/></button></div>
                                <form onSubmit={handleAddApv} className="space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-[10px] uppercase font-bold text-gray-500">APV Number</label><input required readOnly={!!editingApvId} value={newApv.id} onChange={e => setNewApv({...newApv, id: e.target.value})} className={`w-full px-3 py-2 border rounded-lg text-sm ${editingApvId ? 'bg-gray-100 border-gray-200 cursor-not-allowed' : 'border-gray-200'}`} /></div>
                                        <div><label className="text-[10px] uppercase font-bold text-gray-500">PO Ref</label><input required value={newApv.poId} onChange={e => { const val = e.target.value; const matched = purchases.find(p => p.id === val); setNewApv({...newApv, poId: val, ...(matched ? {vendor: matched.vendor, businessUnit: matched.businessUnit, category: matched.category || 'Freshman', amount: matched.amount.toString()} : {})}); }} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" /></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-[10px] uppercase font-bold text-gray-500">Vendor</label><input required value={newApv.vendor} onChange={e => setNewApv({...newApv, vendor: e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" /></div>
                                        <div><label className="text-[10px] uppercase font-bold text-gray-500">Business Unit</label><select value={newApv.businessUnit} onChange={e => setNewApv({...newApv, businessUnit: e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm"><option value="ETMC">ETMC</option><option value="EMI">EMI</option><option value="EHI">EHI</option></select></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-[10px] uppercase font-bold text-gray-500">Invoice Date</label><input required type="date" value={newApv.invoiceDate} onChange={e => setNewApv({...newApv, invoiceDate: e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" /></div>
                                        <div><label className="text-[10px] uppercase font-bold text-gray-500">Due Date</label><input required type="date" value={newApv.dueDate} onChange={e => setNewApv({...newApv, dueDate: e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" /></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-[10px] uppercase font-bold text-gray-500">Billed Amount (₱)</label><input required type="number" step="0.01" value={newApv.amount} onChange={e => setNewApv({...newApv, amount: e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" /></div>
                                        <div><label className="text-[10px] uppercase font-bold text-gray-500">Category</label><select value={newApv.category || 'Freshman'} onChange={e => setNewApv({...newApv, category: e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm"><option value="Freshman">Freshman</option><option value="Trading">Trading</option></select></div>
                                    </div>
                                    <div className="flex gap-2 pt-4"><button type="button" onClick={() => setIsApvModalOpen(false)} className="flex-1 py-3 bg-gray-100 text-gray-600 rounded-xl font-bold text-xs uppercase tracking-widest">Cancel</button><button type="submit" className="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg shadow-indigo-200">Save APV</button></div>
                                </form>
                            </div>
                        </div>
                    )}

                    {isPoModalOpen && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-lg max-h-[90vh] overflow-y-auto p-6 flex flex-col">
                                <div className="flex justify-between items-center mb-6"><h3 className="font-black text-xl text-slate-800 uppercase tracking-tighter">{editingPoId ? 'Edit Purchase Order' : 'New Purchase Order'}</h3><button onClick={() => setIsPoModalOpen(false)} className="text-gray-400"><X size={20}/></button></div>
                                <form onSubmit={handleAddPo} className="space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-[10px] uppercase font-bold text-gray-500">PO Number</label><input required readOnly={!!editingPoId} value={newPo.id} onChange={e => setNewPo({...newPo, id: e.target.value})} className={`w-full px-3 py-2 border rounded-lg text-sm ${editingPoId ? 'bg-gray-100 border-gray-200 cursor-not-allowed' : 'border-gray-200'}`} /></div>
                                        <div><label className="text-[10px] uppercase font-bold text-gray-500">Vendor</label><input required disabled={accessLevel === 1} value={newPo.vendor} onChange={e => setNewPo({...newPo, vendor: e.target.value})} className={`w-full px-3 py-2 border rounded-lg text-sm ${accessLevel === 1 ? 'bg-gray-100 border-gray-200 cursor-not-allowed text-gray-500' : 'border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:outline-none'}`} /></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-[10px] uppercase font-bold text-gray-500">PR Received Date</label><input required disabled={accessLevel === 1} type="date" value={newPo.prReceivedDate} onChange={e => setNewPo({...newPo, prReceivedDate: e.target.value})} className={`w-full px-3 py-2 border rounded-lg text-sm ${accessLevel === 1 ? 'bg-gray-100 border-gray-200 cursor-not-allowed text-gray-500' : 'border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:outline-none'}`} /></div>
                                        <div><label className="text-[10px] uppercase font-bold text-gray-500">PO Issue Date</label><input required disabled={accessLevel === 1} type="date" value={newPo.date} onChange={e => setNewPo({...newPo, date: e.target.value})} className={`w-full px-3 py-2 border rounded-lg text-sm ${accessLevel === 1 ? 'bg-gray-100 border-gray-200 cursor-not-allowed text-gray-500' : 'border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:outline-none'}`} /></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-[10px] uppercase font-bold text-gray-500">{newPo.category === 'Site Rental' || newPo.category === 'Services' ? 'Target Completion' : 'Expected Delivery'}</label><input required type="date" value={newPo.expectedDelivery} onChange={e => setNewPo({...newPo, expectedDelivery: e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none bg-white" /></div>
                                        <div><label className="text-[10px] uppercase font-bold text-gray-500">{newPo.category === 'Site Rental' || newPo.category === 'Services' ? 'Completion Date' : 'Actual Received Date'} <span className="text-gray-400 font-normal lowercase">(Optional)</span></label><input type="date" value={newPo.receivedDate || ''} onChange={e => setNewPo({...newPo, receivedDate: e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none bg-white" /></div>
                                    </div>
                                    <div className="grid grid-cols-3 gap-3">
                                        <div><label className="text-[10px] uppercase font-bold text-gray-500">Gross Amt (₱)</label><input required disabled={accessLevel === 1} type="number" step="0.01" value={newPo.grossAmount} onChange={e => { const gross = e.target.value; const discount = newPo.discountAmount || 0; const net = Math.max(0, parseFloat(gross || 0) - parseFloat(discount)).toString(); setNewPo({...newPo, grossAmount: gross, amount: net}); }} className={`w-full px-2.5 py-2 border rounded-lg text-sm ${accessLevel === 1 ? 'bg-gray-100 border-gray-200' : 'border-gray-200 focus:ring-2 focus:ring-indigo-500'}`} /></div>
                                        <div><label className="text-[10px] uppercase font-bold text-emerald-600">Discount (₱)</label><input disabled={accessLevel === 1} type="number" step="0.01" value={newPo.discountAmount} onChange={e => { const discount = e.target.value; const gross = newPo.grossAmount || 0; const net = Math.max(0, parseFloat(gross || 0) - parseFloat(discount || 0)).toString(); setNewPo({...newPo, discountAmount: discount, amount: net}); }} className={`w-full px-2.5 py-2 border rounded-lg text-sm ${accessLevel === 1 ? 'bg-gray-100 border-gray-200' : 'border-gray-200 focus:ring-2 focus:ring-emerald-500'}`} /></div>
                                        <div><label className="text-[10px] uppercase font-bold text-indigo-600">Net Amount (₱)</label><input disabled type="number" value={newPo.amount} className="w-full px-2.5 py-2 border rounded-lg text-sm bg-indigo-50 text-indigo-800 font-bold border-indigo-200 cursor-not-allowed" /></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div><label className="text-[10px] uppercase font-bold text-gray-500">Category</label><select disabled={accessLevel === 1} value={newPo.category || 'Freshman'} onChange={e => setNewPo({...newPo, category: e.target.value})} className={`w-full px-2.5 py-2 border rounded-lg text-sm ${accessLevel === 1 ? 'bg-gray-100' : ''}`}><option value="Freshman">Freshman</option><option value="Trading">Trading</option></select></div>
                                        <div><label className="text-[10px] uppercase font-bold text-gray-500">Payment Terms</label><select disabled={accessLevel === 1} value={newPo.paymentTerms || 'Terms'} onChange={e => setNewPo({...newPo, paymentTerms: e.target.value})} className={`w-full px-2.5 py-2 border rounded-lg text-sm ${accessLevel === 1 ? 'bg-gray-100' : ''}`}><option value="Terms">Std Terms</option><option value="COD">COD</option></select></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-[10px] uppercase font-bold text-gray-500">PR Requestor</label><input required disabled={accessLevel === 1} type="text" value={newPo.prRequestor || ''} onChange={e => setNewPo({...newPo, prRequestor: e.target.value})} className={`w-full px-3 py-2 border rounded-lg text-sm ${accessLevel === 1 ? 'bg-gray-100' : 'focus:ring-2 focus:ring-indigo-500'}`} placeholder="e.g., Juan Santos" /></div>
                                        <div><label className="text-[10px] uppercase font-bold text-gray-500">Purchasing Processor</label><input required disabled={accessLevel === 1} type="text" value={newPo.processorName || ''} onChange={e => setNewPo({...newPo, processorName: e.target.value})} className={`w-full px-3 py-2 border rounded-lg text-sm ${accessLevel === 1 ? 'bg-gray-100' : 'focus:ring-2 focus:ring-indigo-500'}`} placeholder="e.g., Alex Reyes" /></div>
                                    </div>
                                    <div><label className="text-[10px] uppercase font-bold text-gray-500">Description</label><input required disabled={accessLevel === 1} type="text" value={newPo.description || ''} onChange={e => setNewPo({...newPo, description: e.target.value})} className={`w-full px-3 py-2 border rounded-lg text-sm ${accessLevel === 1 ? 'bg-gray-100' : 'focus:ring-2 focus:ring-indigo-500'}`} placeholder="Brief description of items" /></div>
                                    <div><label className="text-[10px] uppercase font-bold text-gray-500">Remarks / Delivery Notes <span className="text-gray-400 font-normal lowercase">(Optional)</span></label><textarea value={newPo.remarks || ''} onChange={e => setNewPo({...newPo, remarks: e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none bg-white" rows="2" placeholder="Any concerns regarding delivery, quality, or vendor..."></textarea></div>
                                    
                                    <div className="bg-slate-50 p-3 rounded-xl border border-slate-200">
                                        <label className="text-[10px] uppercase font-bold text-slate-700 block mb-2 flex items-center"><Paperclip size={12} className="mr-1"/> Attach PR/PO Document <span className="text-slate-400 font-normal lowercase ml-1">(JPEG/PNG only)</span></label>
                                        <div className="flex flex-col sm:flex-row sm:items-center space-y-2 sm:space-y-0 sm:space-x-3">
                                            <input disabled={accessLevel === 1} type="file" accept="image/jpeg, image/png, image/jpg" onChange={handleFileUpload} className="text-xs file:mr-3 file:py-1.5 file:px-3 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-indigo-100 file:text-indigo-700 hover:file:bg-indigo-200 disabled:opacity-50 w-full" />
                                            {newPo.attachmentData && (
                                                <div className="shrink-0 flex items-center bg-emerald-50 text-emerald-700 px-2.5 py-1.5 rounded-lg text-[10px] font-bold border border-emerald-200">
                                                    <ImageIcon size={12} className="mr-1" /> Image Attached
                                                    <button type="button" onClick={() => setNewPo({...newPo, attachmentData: ''})} className="ml-2 text-emerald-900 hover:text-red-600 bg-emerald-100/50 p-0.5 rounded-full" title="Remove Attachment"><X size={12} /></button>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    <div className="flex gap-2 pt-4"><button type="button" onClick={() => setIsPoModalOpen(false)} className="flex-1 py-3 bg-gray-100 text-gray-600 rounded-xl font-bold text-xs uppercase tracking-widest">Cancel</button><button type="submit" className="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg shadow-indigo-200">Save PO</button></div>
                                </form>
                            </div>
                        </div>
                    )}

                    {isReceiveModalOpen && selectedPo && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 animate-in fade-in duration-200">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden flex flex-col">
                                <div className="px-4 md:px-6 py-3 md:py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                                    <h3 className="font-semibold text-gray-900 text-sm md:text-base">
                                        {selectedPo.category === 'Site Rental' || selectedPo.category === 'Services' ? 'Mark as Completed' : 'Mark PO as Received'}
                                    </h3>
                                    <button onClick={() => setIsReceiveModalOpen(false)} className="text-gray-400 hover:text-gray-600"><X size={20} /></button>
                                </div>
                                <form onSubmit={handleReceivePo} className="p-4 md:p-6 space-y-4">
                                    <div className="text-sm text-gray-600 mb-4">
                                        {selectedPo.category === 'Site Rental' || selectedPo.category === 'Services' 
                                            ? <>Confirming completion for <strong>{selectedPo.id}</strong> from {selectedPo.vendor}.</> 
                                            : <>Confirming receipt for <strong>{selectedPo.id}</strong> from {selectedPo.vendor}.</>}
                                    </div>
                                    <div>
                                        <label className="block text-xs font-medium text-gray-700 mb-1">
                                            {selectedPo.category === 'Site Rental' || selectedPo.category === 'Services' ? 'Date Completed' : 'Date Received'}
                                        </label>
                                        <input required type="date" value={receiveDate} onChange={e => setReceiveDate(e.target.value)} className="w-full px-3 py-2.5 md:py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                                    </div>
                                    <div className="pt-2 md:pt-4 flex flex-col-reverse xs:flex-row justify-end xs:space-x-3"><button type="button" onClick={() => setIsReceiveModalOpen(false)} className="w-full xs:w-auto px-4 py-2.5 md:py-2 mt-2 xs:mt-0 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">Cancel</button><button type="submit" className="w-full xs:w-auto px-4 py-2.5 md:py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-medium transition-colors">Confirm</button></div>
                                </form>
                            </div>
                        </div>
                    )}

                    {viewingImage && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center bg-black/90 backdrop-blur-sm p-4 animate-in fade-in" onClick={() => setViewingImage(null)}>
                            <div className="relative max-w-5xl w-full flex flex-col items-center justify-center h-full" onClick={e => e.stopPropagation()}>
                                <div className="absolute top-4 right-4 flex space-x-2">
                                    <a href={viewingImage} download={`PO_Attachment_${TODAY.getTime()}.jpg`} className="bg-white/20 hover:bg-white/40 text-white p-2 rounded-full transition-colors" title="Download Image"><Download size={24} /></a>
                                    <button onClick={() => setViewingImage(null)} className="bg-white/20 hover:bg-red-500/80 text-white p-2 rounded-full transition-colors" title="Close"><X size={24} /></button>
                                </div>
                                <img src={viewingImage} alt="PO Attachment" className="max-w-full max-h-[90vh] object-contain rounded-lg shadow-2xl" />
                            </div>
                        </div>
                    )}
                    
                    {isClearModalOpen && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 animate-in fade-in duration-200">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden flex flex-col border-t-4 border-red-500">
                                <div className="px-4 md:px-6 py-3 md:py-4 border-b border-gray-100 flex justify-between items-center bg-red-50"><h3 className="font-semibold text-red-800 flex items-center text-sm md:text-base"><AlertTriangle size={18} className="mr-2" /> Warning</h3><button onClick={() => setIsClearModalOpen(false)} className="text-red-400 hover:text-red-600"><X size={20} /></button></div>
                                <div className="p-4 md:p-6 space-y-4 text-center"><p className="text-sm md:text-base text-gray-700">Are you sure you want to permanently delete all Purchase Orders and APV records?</p><p className="text-xs md:text-sm text-gray-500">This action cannot be undone.</p></div>
                                <div className="px-4 md:px-6 py-3 md:py-4 bg-gray-50 flex flex-col-reverse xs:flex-row justify-end xs:space-x-3"><button onClick={() => setIsClearModalOpen(false)} disabled={isClearing} className="w-full xs:w-auto px-4 py-2.5 md:py-2 mt-2 xs:mt-0 text-sm font-medium text-gray-600 hover:bg-gray-200 rounded-lg transition-colors">Cancel</button><button onClick={handleClearAllData} disabled={isClearing} className="w-full xs:w-auto px-4 py-2.5 md:py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg text-sm font-medium transition-colors flex items-center justify-center disabled:opacity-50">{isClearing ? <Loader2 size={16} className="animate-spin mr-2" /> : <Trash2 size={16} className="mr-2" />}{isClearing ? 'Deleting...' : 'Delete Data'}</button></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
