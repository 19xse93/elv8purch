<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProcureDesk | APV Aging Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.12/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: #f8fafc; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        #root:empty { display: flex; align-items: center; justify-content: center; height: 100vh; }
    </style>
</head>
<body>
    <div id="root">
        <div style="text-align: center; color: #64748b; font-family: sans-serif;">
            <div style="width: 40px; height: 40px; border: 3px solid #e2e8f0; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px;"></div>
            <p style="font-size: 14px; font-weight: 500;">Connecting to elev8-be0f4...</p>
        </div>
    </div>
    <style> @keyframes spin { to { transform: rotate(360deg); } } </style>

    <script type="text/babel">
        (() => {
            try {
                const { useState, useMemo, useEffect } = React;
                const Icons = window.LucideReact || {};
                const { 
                    LayoutDashboard, ShoppingCart, FileText, AlertCircle, Clock, CheckCircle, TrendingUp, DollarSign, Calendar, Building, Sparkles, Mail, Loader2, X, Copy, Check, Truck, CalendarDays, Lock, Plus, Trash2, AlertTriangle, Activity, Unlock, User, Wallet, Send, Edit3, Menu, ShieldCheck, Database
                } = Icons;

                const firebaseConfig = {
                    apiKey: "AIzaSyACvR7KEzJs719E0JJtFiDpiZk0kHYnQyE",
                    authDomain: "elev8-be0f4.firebaseapp.com",
                    projectId: "elev8-be0f4",
                    storageBucket: "elev8-be0f4.firebasestorage.app",
                    messagingSenderId: "939507136986",
                    appId: "1:939507136986:web:8a8d417cbbc80921eda8e3"
                };

                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                const auth = firebase.auth();
                const db = firebase.firestore();
                const appId = 'my-procurement-app';
                const TODAY = new Date('2026-03-24T00:00:00'); 

                const formatCurrency = (amt) => new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP' }).format(amt);
                const getAgingCategory = (dueDate, status) => {
                    if (status === 'Paid') return 'Paid';
                    const diff = Math.ceil((TODAY - new Date(dueDate)) / (1000 * 60 * 60 * 24));
                    if (diff <= 0) return 'Current';
                    if (diff <= 30) return '1-30 Days';
                    if (diff <= 60) return '31-60 Days';
                    return '> 60 Days';
                };

                function App() {
                    const [activeTab, setActiveTab] = useState('dashboard');
                    const [user, setUser] = useState(null);
                    const [purchases, setPurchases] = useState([]);
                    const [apvs, setApvs] = useState([]);
                    const [weeklyFund, setWeeklyFund] = useState(5000000);
                    const [isAdmin, setIsAdmin] = useState(false);
                    const [isLoading, setIsLoading] = useState(true);
                    const [showAdminLogin, setShowAdminLogin] = useState(false);
                    const [adminPassword, setAdminPassword] = useState('');
                    
                    // Form States
                    const [isPoModalOpen, setIsPoModalOpen] = useState(false);
                    const [isApvModalOpen, setIsApvModalOpen] = useState(false);
                    const [newPo, setNewPo] = useState({ id: '', vendor: '', amount: '', date: TODAY.toISOString().split('T')[0], expectedDelivery: '', description: '' });
                    const [newApv, setNewApv] = useState({ id: '', poId: '', vendor: '', amount: '', dueDate: '' });

                    useEffect(() => {
                        return auth.onAuthStateChanged(async (u) => {
                            if (!u) await auth.signInAnonymously();
                            else setUser(u);
                        });
                    }, []);

                    useEffect(() => {
                        if (!user) return;
                        const baseRef = db.collection('artifacts').doc(appId).collection('public').doc('data');
                        
                        const unsubP = baseRef.collection('purchases').onSnapshot(snap => setPurchases(snap.docs.map(d => ({id: d.id, ...d.data()}))));
                        const unsubA = baseRef.collection('apvs').onSnapshot(snap => {
                            setApvs(snap.docs.map(d => ({id: d.id, ...d.data()})));
                            setIsLoading(false);
                        });
                        const unsubS = baseRef.collection('settings').doc('treasury').onSnapshot(doc => {
                            if (doc.exists) setWeeklyFund(doc.data().amount);
                        });

                        return () => { unsubP(); unsubA(); unsubS(); };
                    }, [user]);

                    const handleAddPo = async (e) => {
                        e.preventDefault();
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('purchases').doc(newPo.id).set({ ...newPo, status: 'Pending', receivedDate: null });
                        setIsPoModalOpen(false);
                    };

                    const handleAddApv = async (e) => {
                        e.preventDefault();
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('apvs').doc(newApv.id).set({ ...newApv, status: 'Unpaid', funded: false, settledDate: null });
                        setIsApvModalOpen(false);
                    };

                    const toggleFunded = async (apv) => {
                        if (!isAdmin) return;
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('apvs').doc(apv.id).update({ funded: !apv.funded });
                    };

                    const markPaid = async (apv) => {
                        if (!isAdmin) return;
                        const date = prompt("Enter payment date (YYYY-MM-DD)", TODAY.toISOString().split('T')[0]);
                        if (date) await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('apvs').doc(apv.id).update({ status: 'Paid', settledDate: date });
                    };

                    const metrics = useMemo(() => {
                        const unpaid = apvs.filter(a => a.status === 'Unpaid');
                        const totalOutstanding = unpaid.reduce((s, a) => s + Number(a.amount), 0);
                        const earmarked = unpaid.reduce((s, a) => a.funded ? s + Number(a.amount) : s, 0);
                        return { totalOutstanding, earmarked };
                    }, [apvs]);

                    if (isLoading) return <div className="h-screen flex items-center justify-center"><Loader2 className="animate-spin text-blue-600" /></div>;

                    return (
                        <div className="flex h-screen overflow-hidden">
                            <aside className="w-64 bg-slate-900 text-slate-400 flex flex-col hidden md:flex">
                                <div className="p-8 border-b border-slate-800 flex items-center text-white font-bold"><TrendingUp className="mr-3 text-blue-500"/> ProcureDesk</div>
                                <nav className="p-4 space-y-2 flex-1">
                                    {['dashboard', 'purchases', 'apvs'].map(t => (
                                        <button key={t} onClick={() => setActiveTab(t)} className={`w-full text-left px-4 py-3 rounded-xl capitalize ${activeTab === t ? 'bg-blue-600 text-white' : 'hover:bg-slate-800'}`}>{t}</button>
                                    ))}
                                </nav>
                                <div className="p-6 bg-slate-950">
                                    {!isAdmin ? (
                                        <button onClick={() => setShowAdminLogin(true)} className="w-full py-2 bg-indigo-600/20 text-indigo-400 rounded-lg text-xs font-bold uppercase">Unlock Admin</button>
                                    ) : (
                                        <button onClick={() => setIsAdmin(false)} className="w-full py-2 bg-slate-800 text-slate-400 rounded-lg text-xs font-bold uppercase">Admin Active</button>
                                    )}
                                </div>
                            </aside>

                            <main className="flex-1 overflow-y-auto p-4 md:p-8">
                                <header className="flex justify-between items-center mb-8">
                                    <h2 className="text-2xl font-black text-slate-800 capitalize">{activeTab}</h2>
                                    {isAdmin && (
                                        <div className="flex gap-2">
                                            <button onClick={() => setIsPoModalOpen(true)} className="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-lg shadow-blue-200">+ PO</button>
                                            <button onClick={() => setIsApvModalOpen(true)} className="bg-slate-800 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-lg shadow-slate-200">+ APV</button>
                                        </div>
                                    )}
                                </header>

                                {activeTab === 'dashboard' && (
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 animate-in">
                                        <div className="bg-slate-900 p-8 rounded-[2rem] text-white shadow-2xl relative overflow-hidden">
                                            <p className="text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">Weekly Fund Available</p>
                                            <h3 className="text-4xl font-black">{formatCurrency(weeklyFund - metrics.earmarked)}</h3>
                                            <div className="mt-8 flex gap-4">
                                                <div className="bg-white/5 p-4 rounded-2xl border border-white/10 flex-1">
                                                    <p className="text-white/40 text-[10px] font-bold uppercase">Total Outstanding</p>
                                                    <p className="text-lg font-bold">{formatCurrency(metrics.totalOutstanding)}</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'purchases' && (
                                    <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden animate-in">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50 border-b border-slate-100">
                                                <tr className="text-[10px] font-bold text-slate-400 uppercase tracking-widest"><th className="px-6 py-4">Ref</th><th className="px-6 py-4">Vendor</th><th className="px-6 py-4 text-right">Amount</th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {purchases.map(p => (
                                                    <tr key={p.id} className="text-sm">
                                                        <td className="px-6 py-4 font-bold text-blue-600">{p.id}</td>
                                                        <td className="px-6 py-4 font-semibold">{p.vendor}</td>
                                                        <td className="px-6 py-4 text-right font-black">{formatCurrency(p.amount)}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}

                                {activeTab === 'apvs' && (
                                    <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden animate-in">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50 border-b border-slate-100">
                                                <tr className="text-[10px] font-bold text-slate-400 uppercase tracking-widest"><th className="px-6 py-4">APV Ref</th><th className="px-6 py-4">Vendor</th><th className="px-6 py-4 text-center">Status</th><th className="px-6 py-4 text-right">Amount</th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {apvs.map(a => (
                                                    <tr key={a.id} className="text-sm">
                                                        <td className="px-6 py-4 font-bold text-slate-700">{a.id}</td>
                                                        <td className="px-6 py-4 font-semibold">{a.vendor}</td>
                                                        <td className="px-6 py-4 text-center">
                                                            {a.status === 'Paid' ? <span className="text-emerald-600 font-bold uppercase text-[10px]">Paid</span> : (
                                                                <button onClick={() => toggleFunded(a)} className={`px-3 py-1 rounded-full text-[10px] font-bold border ${a.funded ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : 'bg-slate-50 text-slate-400 border-slate-100'}`}>{a.funded ? 'Funded' : 'Pending'}</button>
                                                            )}
                                                            {a.funded && a.status === 'Unpaid' && isAdmin && <button onClick={() => markPaid(a)} className="ml-2 text-[10px] text-blue-600 font-bold underline uppercase">Pay</button>}
                                                        </td>
                                                        <td className="px-6 py-4 text-right font-black">{formatCurrency(a.amount)}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}

                                {/* Modals */}
                                {showAdminLogin && (
                                    <div className="fixed inset-0 z-50 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4">
                                        <div className="bg-white rounded-[40px] p-10 w-full max-w-sm">
                                            <h3 className="text-2xl font-black mb-6 text-center">Admin Login</h3>
                                            <input type="password" value={adminPassword} onChange={e => setAdminPassword(e.target.value)} className="w-full p-4 bg-slate-50 rounded-2xl mb-4 text-center text-xl" placeholder="••••" />
                                            <button onClick={handleLogin} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold">Unlock</button>
                                            <button onClick={() => setShowAdminLogin(false)} className="w-full mt-4 text-slate-400 text-sm">Cancel</button>
                                        </div>
                                    </div>
                                )}

                                {isPoModalOpen && (
                                    <div className="fixed inset-0 z-50 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4">
                                        <form onSubmit={handleAddPo} className="bg-white rounded-[32px] p-8 w-full max-w-md space-y-4">
                                            <h3 className="text-xl font-bold">New Purchase Order</h3>
                                            <input required placeholder="PO Number" value={newPo.id} onChange={e => setNewPo({...newPo, id: e.target.value})} className="w-full p-3 border rounded-xl" />
                                            <input required placeholder="Vendor" value={newPo.vendor} onChange={e => setNewPo({...newPo, vendor: e.target.value})} className="w-full p-3 border rounded-xl" />
                                            <input required type="number" placeholder="Amount" value={newPo.amount} onChange={e => setNewPo({...newPo, amount: e.target.value})} className="w-full p-3 border rounded-xl" />
                                            <input required type="date" value={newPo.expectedDelivery} onChange={e => setNewPo({...newPo, expectedDelivery: e.target.value})} className="w-full p-3 border rounded-xl" />
                                            <button className="w-full py-3 bg-blue-600 text-white rounded-xl font-bold">Save PO</button>
                                            <button type="button" onClick={() => setIsPoModalOpen(false)} className="w-full text-slate-400 text-sm">Cancel</button>
                                        </form>
                                    </div>
                                )}

                                {isApvModalOpen && (
                                    <div className="fixed inset-0 z-50 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4">
                                        <form onSubmit={handleAddApv} className="bg-white rounded-[32px] p-8 w-full max-w-md space-y-4">
                                            <h3 className="text-xl font-bold">New APV Record</h3>
                                            <input required placeholder="APV Number" value={newApv.id} onChange={e => setNewApv({...newApv, id: e.target.value})} className="w-full p-3 border rounded-xl" />
                                            <input required placeholder="PO Reference" value={newApv.poId} onChange={e => setNewApv({...newApv, poId: e.target.value})} className="w-full p-3 border rounded-xl" />
                                            <input required placeholder="Vendor" value={newApv.vendor} onChange={e => setNewApv({...newApv, vendor: e.target.value})} className="w-full p-3 border rounded-xl" />
                                            <input required type="number" placeholder="Amount" value={newApv.amount} onChange={e => setNewApv({...newApv, amount: e.target.value})} className="w-full p-3 border rounded-xl" />
                                            <input required type="date" value={newApv.dueDate} onChange={e => setNewApv({...newApv, dueDate: e.target.value})} className="w-full p-3 border rounded-xl" />
                                            <button className="w-full py-3 bg-slate-800 text-white rounded-xl font-bold">Save APV</button>
                                            <button type="button" onClick={() => setIsApvModalOpen(false)} className="w-full text-slate-400 text-sm">Cancel</button>
                                        </form>
                                    </div>
                                )}
                            </main>
                        </div>
                    );

                    function handleLogin(e) {
                        e.preventDefault();
                        if (adminPassword === 'admin123') { setIsAdmin(true); setShowAdminLogin(false); setAdminPassword(''); }
                        else alert("Wrong passcode");
                    }
                }

                ReactDOM.createRoot(document.getElementById('root')).render(<App />);
            } catch (err) {
                document.getElementById('root').innerHTML = `<div style="color:red; padding:20px;">Startup Error: ${err.message}</div>`;
            }
        })();
    </script>
</body>
</html>
