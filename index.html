        // Smart Date Standardizer (Auto-detects format and converts to YYYY-MM-DD)
        const standardizeDate = (val) => {
            if (!val || typeof val !== 'string') return '';
            val = val.trim();
            if (!val) return '';

            // 1. Check for Excel serial date format (e.g., 44562 for Jan 1, 2022)
            if (!isNaN(val) && Number(val) > 20000 && Number(val) < 90000) {
                const excelDays = parseFloat(val);
                const d = new Date((excelDays - 25569) * 86400 * 1000);
                if (!isNaN(d.getTime())) return d.toISOString().split('T')[0];
            }

            // 2. Standardize delimiters and try parsing
            let d = new Date(val);

            // 3. Fallback for DD/MM/YYYY vs MM/DD/YYYY if invalid or misparsed
            if (isNaN(d.getTime())) {
                const parts = val.split(/[-/.]/); // Split by dash, slash, or dot
                if (parts.length === 3) {
                    // Assume DD/MM/YYYY
                    d = new Date(`${parts[1]}/${parts[0]}/${parts[2]}`);
                    if (isNaN(d.getTime()) && parts[2].length === 2) {
                        // Assume DD/MM/YY
                        d = new Date(`${parts[1]}/${parts[0]}/20${parts[2]}`);
                    }
                }
            }

            // 4. Fallback for textual dates (e.g., 15-Jan-24)
            if (isNaN(d.getTime())) {
                d = new Date(val.replace(/-/g, ' '));
            }

            if (!isNaN(d.getTime())) {
                const year = d.getFullYear();
                if (year < 2000 || year > 2100) return ''; // Sanity check for valid range
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            }

            return ''; // Failed to parse
        };

        const safeParseDate = (dateStr) => {
            if (!dateStr) return null;
            if (!isNaN(dateStr) && !isNaN(parseFloat(dateStr))) {
                const excelDays = parseFloat(dateStr);
                if (excelDays > 20000 && excelDays < 90000) return new Date((excelDays - 25569) * 86400 * 1000);
            }
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return null;
            if (d.getFullYear() < 2000 || d.getFullYear() > 2100) return null;
            return d;
        };

        const formatMonthLabel = (monthStr) => {
            try {
                if (!monthStr || typeof monthStr !== 'string') return 'Unknown';
                const parts = monthStr.split('-');
                if (parts.length < 2) return monthStr;
                const date = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, 1);

        const getAgingCategory = (dueDate, status) => {
            if (status === 'Paid') return 'Paid';
            const due = safeParseDate(dueDate);
            if (!due) return 'Current'; 
            const diffTime = TODAY - due;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            if (diffDays <= 0) return 'Current';
            if (diffDays <= 30) return '1-30 Days';
            if (diffDays <= 60) return '31-60 Days';
            if (diffDays <= 90) return '61-90 Days';
            return '> 90 Days';

        const getWeekRange = (dateStr) => {
            const d = safeParseDate(dateStr) || new Date();
            const day = d.getDay();
            const diffToMonday = day === 0 ? -6 : 1 - day;
            const start = new Date(d); start.setDate(d.getDate() + diffToMonday);
            const end = new Date(start); end.setDate(start.getDate() + 4);
            return `${start.toLocaleDateString('en-US', {month:'short', day:'numeric'})} - ${end.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'})}`;

        const getDaysDiff = (startStr, endStr) => {
            const s = safeParseDate(startStr); const e = safeParseDate(endStr);
            if (!s || !e) return null;
            s.setHours(0,0,0,0); e.setHours(0,0,0,0);
            return Math.round((e - s) / (1000 * 60 * 60 * 24));

        const getDeliveryStatus = (expectedDelivery, receivedDate) => {
            const expected = safeParseDate(expectedDelivery);
            if (!expected) return { label: 'Invalid Date', color: 'bg-rose-100 text-rose-800 border-rose-200' };
            if (receivedDate) {
                const received = safeParseDate(receivedDate);
                if (received) return received <= expected ? { label: 'Received', color: 'bg-emerald-100 text-emerald-800 border-emerald-200' } : { label: 'Received (Late)', color: 'bg-amber-100 text-amber-800 border-amber-200' };

            const diffTime = Math.ceil((TODAY - expected) / (1000 * 60 * 60 * 24));
            if (diffTime > 0) return { label: diffTime > 3650 ? 'Delayed' : `Delayed (${diffTime} days)`, color: 'bg-rose-100 text-rose-800 border-rose-200' };
            return { label: 'Pending Delivery', color: 'bg-blue-100 text-blue-800 border-blue-200' };
        };

        const parseCSV = (text) => {
            const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
            if (lines.length < 2) return [];
            const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
            const result = [];
            for (let i = 1; i < lines.length; i++) {
                const currentline = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const obj = {};
                for (let j = 0; j < headers.length; j++) {
                    let val = currentline[j] ? currentline[j].trim().replace(/^"|"$/g, '') : '';
                    obj[headers[j]] = val;
                }
                result.push(obj);
            }
            return result;

        // --- Error Boundary ---

            constructor(props) {
                super(props);

            }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            componentDidCatch(error, errorInfo) { 
                this.setState({ errorInfo }); 
                // Force clear any persistent loaders if we crash
                const loader = document.getElementById('initial-loader');
                if (loader) loader.remove();
            }
            render() {
                if (this.state.hasError) {

                const currentDay = TODAY.getDay();

                const startOfWeek = new Date(TODAY);

                startOfWeek.setHours(0,0,0,0);
                const endOfCurrentWeek = new Date(startOfWeek);

                        }
                    }

                const vAging = {};

                                </form>
                            </div>
                        </div>
                    )}

                    {isReceiveModalOpen && selectedPo && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 animate-in fade-in duration-200">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden flex flex-col">
                                <div className="px-4 md:px-6 py-3 md:py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50"><h3 className="font-semibold text-gray-900 text-sm md:text-base">Mark PO as Received</h3><button onClick={() => setIsReceiveModalOpen(false)} className="text-gray-400 hover:text-gray-600"><X size={20} /></button></div>
                                <form onSubmit={handleReceivePo} className="p-4 md:p-6 space-y-4">
                                    <div className="text-sm text-gray-600 mb-4">Confirming receipt for <strong>{selectedPo.id}</strong> from {selectedPo.vendor}.</div>
                                    <div><label className="block text-xs font-medium text-gray-700 mb-1">Date Received</label><input required type="date" value={receiveDate} onChange={e => setReceiveDate(e.target.value)} className="w-full px-3 py-2.5 md:py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" /></div>
                                    <div className="pt-2 md:pt-4 flex flex-col-reverse xs:flex-row justify-end xs:space-x-3"><button type="button" onClick={() => setIsReceiveModalOpen(false)} className="w-full xs:w-auto px-4 py-2.5 md:py-2 mt-2 xs:mt-0 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">Cancel</button><button type="submit" className="w-full xs:w-auto px-4 py-2.5 md:py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-medium transition-colors">Confirm</button></div>
                                </form>
                            </div>
                        </div>
                    )}

                    {emailModalOpen && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4 animate-in fade-in">
                            <div className="bg-white rounded-[2rem] md:rounded-[3rem] p-6 md:p-10 w-full max-w-2xl shadow-2xl flex flex-col max-h-[90vh]">
                                <div className="flex justify-between items-center mb-6 shrink-0"><h3 className="text-lg md:text-2xl font-black tracking-tight text-slate-800 flex items-center"><Mail size={24} className="mr-3 text-indigo-600" /> Draft Email</h3><button type="button" onClick={() => setEmailModalOpen(false)} className="text-slate-400 hover:text-slate-600 bg-slate-100 p-2 rounded-full"><X size={18}/></button></div>
                                <div className="flex-1 overflow-y-auto mb-6 bg-slate-50 rounded-2xl p-6 border border-slate-100">{isDraftingEmail ? (<div className="flex flex-col items-center justify-center py-12 text-indigo-600"><Loader2 size={32} className="animate-spin mb-4" /><p className="font-bold uppercase tracking-widest text-xs">Writing email...</p></div>) : (<div className="text-slate-700 whitespace-pre-wrap text-sm leading-relaxed">{currentEmailDraft}</div>)}</div>
                                <div className="flex gap-3 md:gap-4 shrink-0"><button onClick={() => setEmailModalOpen(false)} className="flex-1 py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold uppercase text-[10px] md:text-xs tracking-widest transition-all hover:bg-slate-200">Close</button><button disabled={isDraftingEmail} onClick={handleCopy} className="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-bold uppercase text-[10px] md:text-xs tracking-widest shadow-xl shadow-indigo-200 transition-all hover:bg-indigo-700 flex justify-center items-center">{copySuccess ? <Check size={16} className="mr-2" /> : <Copy size={16} className="mr-2" />}{copySuccess ? 'Copied!' : 'Copy Text'}</button></div>
                            </div>
                        </div>
                    )}
                    
                    {isClearModalOpen && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 animate-in fade-in duration-200">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden flex flex-col border-t-4 border-red-500">
                                <div className="px-4 md:px-6 py-3 md:py-4 border-b border-gray-100 flex justify-between items-center bg-red-50"><h3 className="font-semibold text-red-800 flex items-center text-sm md:text-base"><AlertTriangle size={18} className="mr-2" /> Warning</h3><button onClick={() => setIsClearModalOpen(false)} className="text-red-400 hover:text-red-600"><X size={20} /></button></div>
                                <div className="p-4 md:p-6 space-y-4 text-center"><p className="text-sm md:text-base text-gray-700">Are you sure you want to permanently delete all Purchase Orders and APV records?</p><p className="text-xs md:text-sm text-gray-500">This action cannot be undone.</p></div>
                                <div className="px-4 md:px-6 py-3 md:py-4 bg-gray-50 flex flex-col-reverse xs:flex-row justify-end xs:space-x-3"><button onClick={() => setIsClearModalOpen(false)} disabled={isClearing} className="w-full xs:w-auto px-4 py-2.5 md:py-2 mt-2 xs:mt-0 text-sm font-medium text-gray-600 hover:bg-gray-200 rounded-lg transition-colors">Cancel</button><button onClick={handleClearAllData} disabled={isClearing} className="w-full xs:w-auto px-4 py-2.5 md:py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg text-sm font-medium transition-colors flex items-center justify-center disabled:opacity-50">{isClearing ? <Loader2 size={16} className="animate-spin mr-2" /> : <Trash2 size={16} className="mr-2" />}{isClearing ? 'Deleting...' : 'Delete Data'}</button></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
