<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProcureDesk | Elev8 Purchasing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: #f8fafc; color: #1e293b; overflow: hidden; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #root:empty { display: flex; align-items: center; justify-content: center; height: 100vh; background: #0f172a; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; }
    </style>
</head>
<body>
    <div id="root">
        <div style="text-align: center; color: white; font-family: sans-serif;">
            <div class="spinner" style="width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #3b82f6; border-radius: 50%; margin: 0 auto 16px;"></div>
            <p style="font-size: 14px; font-weight: 600; letter-spacing: 0.05em; color: #94a3b8;">SYNCHRONIZING FINANCIAL DATA...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyACvR7KEzJs719E0JJtFiDpiZk0kHYnQyE",
            authDomain: "elev8-be0f4.firebaseapp.com",
            projectId: "elev8-be0f4",
            storageBucket: "elev8-be0f4.firebasestorage.app",
            messagingSenderId: "939507136986",
            appId: "1:939507136986:web:8a8d417cbbc80921eda8e3"
        };

        const APP_ID = 'my-procurement-app';
        const TODAY = new Date('2026-03-24');

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [user, setUser] = useState(null);
            const [purchases, setPurchases] = useState([]);
            const [apvs, setApvs] = useState([]);
            const [weeklyFund, setWeeklyFund] = useState(5000000);
            const [isAdmin, setIsAdmin] = useState(false);
            const [isLoading, setIsLoading] = useState(true);
            const [syncError, setSyncError] = useState(null);
            const [showAdminLogin, setShowAdminLogin] = useState(false);
            const [adminPassword, setAdminPassword] = useState('');

            const [isPoModalOpen, setIsPoModalOpen] = useState(false);
            const [isApvModalOpen, setIsApvModalOpen] = useState(false);
            const [isFundModalOpen, setIsFundModalOpen] = useState(false);
            
            const [editingPoId, setEditingPoId] = useState(null);
            const [editingApvId, setEditingApvId] = useState(null);

            const [newPo, setNewPo] = useState({ id: '', vendor: '', amount: '', description: '', prReceivedDate: '', poDate: '', expectedDelivery: '', personnel: '' });
            const [newApv, setNewApv] = useState({ id: '', poId: '', vendor: '', invoiceDate: '', dueDate: '', amount: '', funded: false });
            const [fundInput, setFundInput] = useState('');

            useEffect(() => {
                // Initialize Firebase once
                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                }
                const auth = firebase.auth();
                const db = firebase.firestore();

                // Authentication listener
                const unsubscribeAuth = auth.onAuthStateChanged(async (u) => {
                    if (!u) {
                        try {
                            await auth.signInAnonymously();
                        } catch (e) {
                            console.error("Auth failed:", e);
                            setSyncError("Authentication Failed");
                            setIsLoading(false);
                        }
                    } else {
                        setUser(u);
                        
                        // Reference paths per environment rules
                        const dataRef = db.collection('artifacts').doc(APP_ID).collection('public').doc('data');
                        
                        // Snapshot listeners with error callbacks to prevent hanging
                        const unsubPurchases = dataRef.collection('purchases').onSnapshot(
                            (snap) => {
                                setPurchases(snap.docs.map(d => ({id: d.id, ...d.data()})));
                            },
                            (err) => {
                                console.error("Purchases listener error:", err);
                                setSyncError("Database connection interrupted");
                            }
                        );

                        const unsubApvs = dataRef.collection('apvs').onSnapshot(
                            (snap) => {
                                setApvs(snap.docs.map(d => ({id: d.id, ...d.data()})));
                                setIsLoading(false); // Success path
                            },
                            (err) => {
                                console.error("APV listener error:", err);
                                setIsLoading(false); // Fail path but allow UI to render
                            }
                        );

                        const unsubSettings = dataRef.collection('settings').doc('treasury').onSnapshot(
                            (doc) => {
                                if (doc.exists) {
                                    setWeeklyFund(doc.data().amount);
                                    setFundInput(doc.data().amount.toString());
                                }
                            }
                        );

                        return () => {
                            unsubPurchases();
                            unsubApvs();
                            unsubSettings();
                        };
                    }
                });

                return () => unsubscribeAuth();
            }, []);

            const formatCurrency = (amt) => new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP' }).format(amt);

            const getAgingCategory = (dueDate) => {
                const due = new Date(dueDate);
                const diffDays = Math.ceil((TODAY - due) / (1000 * 60 * 60 * 24));
                if (diffDays <= 0) return 'Current';
                if (diffDays <= 30) return '1-30 Days';
                if (diffDays <= 60) return '31-60 Days';
                return '60+ Days';
            };

            const metrics = useMemo(() => {
                const aging = { 'Current': 0, '1-30 Days': 0, '31-60 Days': 0, '60+ Days': 0 };
                let unpaidTotal = 0;
                let fundedUnpaid = 0;

                apvs.forEach(a => {
                    if (a.status !== 'Paid') {
                        const cat = getAgingCategory(a.dueDate);
                        aging[cat] += Number(a.amount || 0);
                        unpaidTotal += Number(a.amount || 0);
                        if (a.funded) fundedUnpaid += Number(a.amount || 0);
                    }
                });

                const personnelStats = {};
                purchases.forEach(p => {
                    if (p.prReceivedDate && p.poDate) {
                        const name = p.personnel || 'Other';
                        if (!personnelStats[name]) personnelStats[name] = { totalDays: 0, count: 0 };
                        const start = new Date(p.prReceivedDate);
                        const end = new Date(p.poDate);
                        const diff = Math.ceil((end - start) / (1000 * 60 * 60 * 24));
                        personnelStats[name].totalDays += diff;
                        personnelStats[name].count += 1;
                    }
                });

                const personnelList = Object.keys(personnelStats).map(name => ({
                    name: name,
                    avg: (personnelStats[name].totalDays / personnelStats[name].count).toFixed(1)
                })).sort((a,b) => Number(a.avg) - Number(b.avg));

                const poWithDates = purchases.filter(p => p.prReceivedDate && p.poDate);
                const totalLT = poWithDates.reduce((acc, p) => acc + Math.ceil((new Date(p.poDate) - new Date(p.prReceivedDate)) / (1000 * 60 * 60 * 24)), 0);
                const avgLT = poWithDates.length > 0 ? (totalLT / poWithDates.length).toFixed(1) : '0';

                return { aging, unpaidTotal, fundedUnpaid, avgLT, personnelList };
            }, [apvs, purchases]);

            const handleSavePo = async (e) => {
                e.preventDefault();
                try {
                    await firebase.firestore().collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('purchases').doc(newPo.id).set({
                        ...newPo, amount: Number(newPo.amount)
                    }, { merge: true });
                    setIsPoModalOpen(false);
                    setNewPo({ id: '', vendor: '', amount: '', description: '', prReceivedDate: '', poDate: '', expectedDelivery: '', personnel: '' });
                } catch (err) { console.error(err); }
            };

            const handleSaveApv = async (e) => {
                e.preventDefault();
                try {
                    await firebase.firestore().collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('apvs').doc(newApv.id).set({
                        ...newApv, amount: Number(newApv.amount)
                    }, { merge: true });
                    setIsApvModalOpen(false);
                    setNewApv({ id: '', poId: '', vendor: '', invoiceDate: '', dueDate: '', amount: '', funded: false });
                } catch (err) { console.error(err); }
            };

            const openEditPo = (p) => { setEditingPoId(p.id); setNewPo(p); setIsPoModalOpen(true); };
            const openEditApv = (a) => { setEditingApvId(a.id); setNewApv(a); setIsApvModalOpen(true); };

            const handleUpdateFund = async (e) => {
                e.preventDefault();
                try {
                    await firebase.firestore().collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('settings').doc('treasury').set({ amount: Number(fundInput) });
                    setIsFundModalOpen(false);
                } catch (err) { console.error(err); }
            };

            const handleAdminLoginSubmit = (e) => {
                e.preventDefault();
                if (adminPassword === 'admin123') {
                    setIsAdmin(true);
                    setShowAdminLogin(false);
                    setAdminPassword('');
                } else {
                    alert("Incorrect passcode");
                }
            };

            const toggleFunded = async (apv) => {
                if (!isAdmin) return;
                try {
                    await firebase.firestore().collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('apvs').doc(apv.id).update({
                        funded: !apv.funded
                    });
                } catch (err) { console.error(err); }
            };

            const Icon = ({ name, size = 18, className = "" }) => {
                // Lucide unpkg script attaches icons to the 'lucide' global object
                const icon = window.lucide ? window.lucide[name] : null;
                if (!icon) return <div style={{width: size, height: size}} className={className}></div>;
                
                // Create the icon manually using Lucide's API or a placeholder if complex
                // Simplified approach for HTML implementation:
                return (
                    <i 
                        data-lucide={name.replace(/[A-Z]/g, letter => `-${letter.toLowerCase()}`).replace(/^-/, '')} 
                        style={{width: size, height: size}} 
                        className={className}
                    ></i>
                );
            };

            // Call lucide.createIcons after each render to process any new icon elements
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            if (isLoading) {
                return (
                    <div className="h-screen flex flex-col items-center justify-center bg-slate-900 text-white">
                        <div className="spinner mb-4 w-12 h-12 border-4 border-slate-700 border-t-blue-500 rounded-full"></div>
                        <h2 className="font-black text-xl tracking-widest uppercase animate-pulse">Synchronizing Data...</h2>
                        {syncError && <p className="mt-4 text-rose-500 font-bold">{syncError}</p>}
                    </div>
                );
            }

            return (
                <div className="flex h-screen overflow-hidden bg-slate-50">
                    {/* Sidebar */}
                    <aside className="w-64 bg-slate-900 p-8 flex flex-col hidden md:flex shrink-0">
                        <div className="mb-10 flex items-center text-white font-black text-xl tracking-tight">
                            <Icon name="TrendingUp" className="mr-3 text-blue-500" size={24} /> ProcureDesk
                        </div>
                        <nav className="space-y-1 flex-1">
                            {[
                                {id:'dashboard', label:'Dashboard', icon:'LayoutDashboard'}, 
                                {id:'purchases', label:'PO Monitoring', icon:'ShoppingCart'}, 
                                {id:'apvs', label:'APV Aging', icon:'Clock'}
                            ].map(t => (
                                <button key={t.id} onClick={() => setActiveTab(t.id)} className={`w-full flex items-center px-5 py-3 rounded-2xl transition-all font-semibold ${activeTab === t.id ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/40' : 'text-slate-400 hover:bg-slate-800'}`}>
                                    <Icon name={t.icon} className="mr-3" size={18} /> {t.label}
                                </button>
                            ))}
                        </nav>
                        <div className="mt-auto border-t border-slate-800 pt-6">
                            {!isAdmin ? (
                                <button onClick={() => setShowAdminLogin(true)} className="w-full py-3 bg-blue-600/10 text-blue-500 border border-blue-900/50 rounded-xl text-[10px] font-bold uppercase tracking-widest">Admin Unlock</button>
                            ) : (
                                <button onClick={() => setIsAdmin(false)} className="w-full py-3 bg-emerald-600/10 text-emerald-500 border border-emerald-900/50 rounded-xl text-[10px] font-bold uppercase flex items-center justify-center gap-2"><Icon name="ShieldCheck" size={14}/> Super User Active</button>
                            )}
                        </div>
                    </aside>

                    {/* Main Area */}
                    <main className="flex-1 p-10 overflow-y-auto">
                        <header className="flex justify-between items-center mb-10">
                            <h2 className="text-3xl font-black tracking-tight capitalize">{activeTab.replace('-',' ')}</h2>
                            {isAdmin && (
                                <div className="flex gap-3">
                                    <button onClick={() => { setEditingPoId(null); setNewPo({ id: '', vendor: '', amount: '', description: '', prReceivedDate: '', poDate: '', expectedDelivery: '', personnel: '' }); setIsPoModalOpen(true); }} className="px-5 py-2.5 bg-blue-600 text-white rounded-xl text-xs font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all">+ NEW PO</button>
                                    <button onClick={() => { setEditingApvId(null); setNewApv({ id: '', poId: '', vendor: '', invoiceDate: '', dueDate: '', amount: '', funded: false }); setIsApvModalOpen(true); }} className="px-5 py-2.5 bg-slate-800 text-white rounded-xl text-xs font-bold shadow-lg hover:bg-black transition-all">+ NEW APV</button>
                                </div>
                            )}
                        </header>

                        {activeTab === 'dashboard' && (
                            <div className="space-y-8 animate-in">
                                <div className="bg-slate-900 rounded-[2.5rem] p-10 text-white relative overflow-hidden shadow-2xl">
                                    <div className="relative z-10 flex flex-col md:flex-row justify-between md:items-center gap-6">
                                        <div>
                                            <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-3 flex items-center gap-2"><Icon name="Wallet" size={12} className="text-blue-500"/> Treasury Fund Allocation</p>
                                            <h3 className="text-5xl font-black tracking-tighter">{formatCurrency(weeklyFund - metrics.fundedUnpaid)}</h3>
                                            <div className="mt-4 flex gap-3">
                                                <div className="px-4 py-2 bg-white/5 border border-white/10 rounded-full text-[10px] font-bold uppercase">Weekly Total: {formatCurrency(weeklyFund)}</div>
                                            </div>
                                        </div>
                                        {isAdmin && (
                                            <button onClick={() => setIsFundModalOpen(true)} className="px-6 py-4 bg-white/10 border border-white/20 rounded-2xl flex items-center gap-3 hover:bg-white/20 transition-all">
                                                <Icon name="Edit3" size={20} className="text-blue-400" />
                                                <div className="text-left"><div className="text-[10px] font-bold opacity-60 uppercase tracking-widest">Budget Settings</div><div className="text-sm font-bold uppercase">Update Fund</div></div>
                                            </button>
                                        )}
                                    </div>
                                    <div className="absolute -right-20 -bottom-20 opacity-5">
                                        <Icon name="Activity" size={300} />
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm flex items-center justify-between transition-all hover:shadow-md">
                                        <div className="flex-1">
                                            <p className="
