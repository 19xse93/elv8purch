<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProcureDesk | Project elev8-be0f4</title>
    <!-- Core Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.12/babel.min.js"></script>
    <!-- Firebase SDKs (Compat Version for Browser) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: #0f172a; color: white; overflow: hidden; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #root:empty { display: flex; align-items: center; justify-content: center; height: 100vh; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 12px; display: inline-block; transition: all 0.3s ease; }
        .dot-waiting { background: #475569; }
        .dot-success { background: #22c55e; box-shadow: 0 0 12px #22c55e; }
        .dot-error { background: #ef4444; box-shadow: 0 0 12px #ef4444; }
        .step-item { display: flex; align-items: center; margin-bottom: 16px; transition: color 0.3s ease; }
        .step-text-waiting { color: #64748b; }
        .step-text-active { color: #f8fafc; font-weight: 600; }
    </style>
</head>
<body>
    <div id="root">
        <!-- Static Diagnostic UI -->
        <div style="max-width: 450px; width: 100%; padding: 40px; text-align: left;" id="diagnostic-ui">
            <div style="margin-bottom: 40px;">
                <div style="background: #3b82f6; width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                </div>
                <h1 style="font-size: 28px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.02em;">ProcureDesk</h1>
                <p style="font-size: 14px; color: #94a3b8; font-weight: 500;">Connecting to: <span style="color: #3b82f6;">elev8-be0f4</span></p>
            </div>
            
            <div style="background: #1e293b; padding: 24px; border-radius: 20px; border: 1px solid #334155; font-family: ui-monospace, monospace; font-size: 13px;">
                <div class="step-item" id="step-1"><span class="status-dot dot-waiting"></span> [1] Initialize Firebase SDK</div>
                <div class="step-item" id="step-2"><span class="status-dot dot-waiting"></span> [2] Authentication Session</div>
                <div class="step-item" id="step-3"><span class="status-dot dot-waiting"></span> [3] Firestore Data Stream</div>
                <div class="step-item" id="step-4"><span class="status-dot dot-waiting"></span> [4] Render Application</div>
            </div>

            <div id="error-box" style="display: none; margin-top: 24px; padding: 20px; background: #450a0a; border: 1px solid #991b1b; border-radius: 16px; color: #fecaca; font-size: 12px; line-height: 1.6;">
                <div style="display: flex; align-items: center; margin-bottom: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: #ef4444;">
                    Connection Issue Detected
                </div>
                <span id="error-text"></span>
                <button onclick="location.reload()" style="margin-top: 16px; background: #991b1b; color: white; border: none; padding: 8px 16px; border-radius: 8px; font-size: 11px; font-weight: 800; cursor: pointer; display: block;">RETRY CONNECTION</button>
            </div>
        </div>
    </div>

    <script type="text/babel">
        // Using an IIFE to isolate the scope and avoid 'Infinity' declaration conflicts with Babel standalone
        (function(React, ReactDOM, firebase, LucideReact) {
            "use strict";

            const { useState, useMemo, useEffect } = React;

            const updateStep = (id, status) => {
                const el = document.getElementById('step-' + id);
                if (el) {
                    const dot = el.querySelector('.status-dot');
                    if (dot) dot.className = 'status-dot dot-' + status;
                    el.className = 'step-item ' + (status === 'success' ? 'step-text-active' : 'step-text-waiting');
                }
            };

            const showError = (msg) => {
                const box = document.getElementById('error-box');
                const text = document.getElementById('error-text');
                if (box && text) {
                    box.style.display = 'block';
                    text.innerText = msg;
                }
            };

            // Firebase Config
            const firebaseConfig = {
                apiKey: "AIzaSyACvR7KEzJs719E0JJtFiDpiZk0kHYnQyE",
                authDomain: "elev8-be0f4.firebaseapp.com",
                projectId: "elev8-be0f4",
                storageBucket: "elev8-be0f4.firebasestorage.app",
                messagingSenderId: "939507136986",
                appId: "1:939507136986:web:8a8d417cbbc80921eda8e3"
            };

            // Initialize Firebase
            if (!firebase.apps.length) {
                try {
                    firebase.initializeApp(firebaseConfig);
                    updateStep(1, 'success');
                } catch (err) {
                    updateStep(1, 'error');
                    showError("FIREBASE_INIT_ERROR: " + err.message);
                }
            } else {
                updateStep(1, 'success');
            }

            const auth = firebase.auth();
            const db = firebase.firestore();
            const appId = 'my-procurement-app';
            const TODAY = new Date('2026-03-24T00:00:00');

            // Icons extraction
            const { 
                LayoutDashboard, ShoppingCart, FileText, TrendingUp, DollarSign, 
                Loader2, Lock, ShieldCheck, Database, Plus, Check, Wallet, Activity,
                X, Menu, Clock
            } = LucideReact;

            const seedDatabase = async () => {
                const baseRef = db.collection('artifacts').doc(appId).collection('public').doc('data');
                try {
                    await baseRef.collection('settings').doc('treasury').set({ amount: 5000000 });
                    await baseRef.collection('purchases').doc('PO-2026-001').set({ 
                        id: 'PO-2026-001', vendor: 'Sample Tech Solutions', amount: 150000, status: 'Pending', date: '2026-03-24', description: 'Office Equipment Upgrade'
                    });
                    console.log("Database seeded successfully.");
                } catch (err) {
                    console.error("Seeding failed:", err);
                }
            };

            function App() {
                const [purchases, setPurchases] = useState([]);
                const [apvs, setApvs] = useState([]);
                const [weeklyFund, setWeeklyFund] = useState(0);
                const [isLoading, setIsLoading] = useState(true);
                const [activeTab, setActiveTab] = useState('dashboard');
                const [isAdmin, setIsAdmin] = useState(false);
                const [showAdminLogin, setShowAdminLogin] = useState(false);
                const [adminPassword, setAdminPassword] = useState('');

                useEffect(() => {
                    const unsubAuth = auth.onAuthStateChanged(async (user) => {
                        if (!user) {
                            try {
                                await auth.signInAnonymously();
                                updateStep(2, 'success');
                            } catch (e) {
                                updateStep(2, 'error');
                                showError("AUTH_ERROR: Anonymous sign-in is not enabled. Go to Firebase Console > Authentication > Sign-in method.");
                            }
                        } else {
                            updateStep(2, 'success');
                            startDataSync();
                        }
                    });

                    const startDataSync = () => {
                        const baseRef = db.collection('artifacts').doc(appId).collection('public').doc('data');
                        
                        const unsubP = baseRef.collection('purchases').onSnapshot(snap => {
                            updateStep(3, 'success');
                            if (snap.empty) {
                                seedDatabase();
                            } else {
                                setPurchases(snap.docs.map(d => ({id: d.id, ...d.data()})));
                            }
                        }, err => {
                            updateStep(3, 'error');
                            showError("DATABASE_ERROR: Access Denied. Check your Firestore Rules. Ensure they are set to allow read/write.");
                        });

                        const unsubA = baseRef.collection('apvs').onSnapshot(snap => {
                            setApvs(snap.docs.map(d => ({id: d.id, ...d.data()})));
                            setIsLoading(false);
                            updateStep(4, 'success');
                        });

                        const unsubS = baseRef.collection('settings').doc('treasury').onSnapshot(doc => {
                            if (doc.exists) setWeeklyFund(doc.data().amount);
                        });

                        return () => { unsubP(); unsubA(); unsubS(); };
                    };

                    return () => unsubAuth();
                }, []);

                const formatCurrency = (amt) => new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP' }).format(amt);

                const handleAdminLogin = (e) => {
                    e.preventDefault();
                    if (adminPassword === 'admin123') {
                        setIsAdmin(true);
                        setShowAdminLogin(false);
                        setAdminPassword('');
                    } else {
                        alert("Invalid Passcode. Use admin123");
                    }
                };

                if (isLoading) return null;

                const IconComp = ({icon: Icon, ...props}) => Icon ? <Icon {...props} /> : null;

                return (
                    <div className="flex h-screen bg-slate-50 text-slate-900 animate-in overflow-hidden">
                        {/* Desktop Sidebar */}
                        <aside className="w-64 bg-slate-900 p-8 flex flex-col hidden md:flex">
                            <div className="mb-10 text-white">
                                <h1 className="font-black text-2xl flex items-center">
                                    <IconComp icon={TrendingUp} className="mr-3 text-blue-500" /> ProcureDesk
                                </h1>
                            </div>
                            <nav className="space-y-2 flex-1 text-slate-400">
                                <button onClick={() => setActiveTab('dashboard')} className={`w-full text-left px-5 py-3 rounded-2xl transition-all font-semibold ${activeTab === 'dashboard' ? 'bg-blue-600 text-white shadow-xl shadow-blue-900/20' : 'hover:bg-slate-800 hover:text-white'}`}>Dashboard</button>
                                <button onClick={() => setActiveTab('purchases')} className={`w-full text-left px-5 py-3 rounded-2xl transition-all font-semibold ${activeTab === 'purchases' ? 'bg-blue-600 text-white shadow-xl shadow-blue-900/20' : 'hover:bg-slate-800 hover:text-white'}`}>Purchases</button>
                            </nav>
                            <div className="mt-auto pt-6 border-t border-slate-800">
                                {!isAdmin ? (
                                    <button onClick={() => setShowAdminLogin(true)} className="w-full py-3 bg-blue-600/10 text-blue-400 border border-blue-900/50 rounded-xl text-[10px] font-bold uppercase tracking-widest">Admin Unlock</button>
                                ) : (
                                    <div className="flex items-center text-[10px] text-emerald-400 font-bold uppercase tracking-widest">
                                        <IconComp icon={ShieldCheck} size={14} className="mr-2"/> Admin Access Active
                                    </div>
                                )}
                            </div>
                        </aside>

                        {/* Mobile View Toggle */}
                        <div className="md:hidden fixed bottom-6 right-6 z-50">
                            <button onClick={() => setActiveTab(activeTab === 'dashboard' ? 'purchases' : 'dashboard')} className="p-4 bg-slate-900 text-white rounded-full shadow-2xl">
                                <IconComp icon={Menu} />
                            </button>
                        </div>

                        {/* Main Content */}
                        <main className="flex-1 p-8 md:p-12 overflow-y-auto w-full">
                            <header className="flex justify-between items-center mb-10">
                                <div>
                                    <h2 className="text-3xl font-black text-slate-900 capitalize tracking-tight">{activeTab}</h2>
                                    <p className="text-slate-400 text-sm font-medium mt-1">Live Environment: elev8-be0f4</p>
                                </div>
                                <div className="flex items-center space-x-2 text-xs font-bold bg-white px-4 py-2 rounded-xl shadow-sm border border-slate-100">
                                    <div className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse mr-2"></div>
                                    <span className="text-slate-500 uppercase tracking-tighter hidden sm:inline">Streaming Active</span>
                                </div>
                            </header>

                            {activeTab === 'dashboard' ? (
                                <div className="space-y-8 max-w-5xl">
                                    <div className="bg-slate-900 rounded-[3rem] p-10 md:p-12 text-white relative overflow-hidden shadow-2xl">
                                        <div className="relative z-10">
                                            <p className="text-slate-400 text-xs font-bold uppercase tracking-widest mb-3 flex items-center">
                                                <IconComp icon={Wallet} size={16} className="mr-2 text-blue-500" /> Allocated Weekly Fund
                                            </p>
                                            <h3 className="text-5xl md:text-6xl font-black tracking-tight">{formatCurrency(weeklyFund)}</h3>
                                            <p className="mt-6 text-sm text-slate-500 font-medium">Funds managed globally via Firestore</p>
                                        </div>
                                        <div className="absolute top-0 right-0 p-12 opacity-5"><IconComp icon={TrendingUp} size={280} /></div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 flex items-center">
                                            <div className="p-4 bg-blue-50 text-blue-600 rounded-2xl mr-6"><IconComp icon={ShoppingCart} size={28}/></div>
                                            <div>
                                                <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Active Records</p>
                                                <h4 className="text-2xl font-black text-slate-900">{purchases.length} Items</h4>
                                            </div>
                                        </div>
                                        <div className="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 flex items-center">
                                            <div className="p-4 bg-emerald-50 text-emerald-600 rounded-2xl mr-6"><IconComp icon={Activity} size={28}/></div>
                                            <div>
                                                <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest">System Health</p>
                                                <h4 className="text-2xl font-black text-slate-900">Optimal</h4>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="bg-white border border-slate-100 rounded-[2rem] overflow-hidden shadow-sm max-w-5xl">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50 border-b border-slate-100">
                                                <tr className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                                                    <th className="px-8 py-6">PO Ref</th>
                                                    <th className="px-8 py-6">Vendor Name</th>
                                                    <th className="px-8 py-6 text-right">Amount</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {purchases.map((p, i) => (
                                                    <tr key={i} className="hover:bg-slate-50/50 transition-colors">
                                                        <td className="px-8 py-6 font-bold text-blue-600 tracking-tight">{p.id}</td>
                                                        <td className="px-8 py-6 font-semibold text-slate-700">{p.vendor}</td>
                                                        <td className="px-8 py-6 text-right font-black text-slate-900">{formatCurrency(p.amount)}</td>
                                                    </tr>
                                                ))}
                                                {purchases.length === 0 && (
                                                    <tr><td colSpan="3" className="px-8 py-20 text-center text-slate-400 font-medium italic">No records found. Connecting...</td></tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                        </main>

                        {/* Admin Auth Modal */}
                        {showAdminLogin && (
                            <div className="fixed inset-0 z-50 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4">
                                <div className="bg-white rounded-[3rem] p-10 w-full max-w-sm shadow-2xl animate-in">
                                    <div className="text-center mb-8">
                                        <div className="bg-indigo-50 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 text-indigo-600">
                                            <IconComp icon={Lock} size={32} />
                                        </div>
                                        <h3 className="text-2xl font-black text-slate-800">Admin Lock</h3>
                                        <p className="text-slate-400 text-sm font-medium mt-1">Passcode: admin123</p>
                                    </div>
                                    <form onSubmit={handleAdminLogin} className="space-y-6 text-slate-900">
                                        <input 
                                            type="password" autoFocus value={adminPassword}
                                            onChange={(e) => setAdminPassword(e.target.value)}
                                            className="w-full p-5 bg-slate-50 rounded-2xl text-center text-2xl font-bold tracking-[0.5em] focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                                            placeholder="••••"
                                        />
                                        <button className="w-full py-5 bg-slate-900 text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl">Unlock System</button>
                                        <button type="button" onClick={() => setShowAdminLogin(false)} className="w-full text-xs text-slate-400 font-bold uppercase tracking-widest text-center mt-4">Cancel</button>
                                    </form>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            // Cleanup diagnostic UI and mount React
            const diag = document.getElementById('diagnostic-ui');
            if (diag) diag.style.display = 'none';
            
            const rootEl = document.getElementById('root');
            if (rootEl) {
                ReactDOM.createRoot(rootEl).render(<App />);
            }

        })(window.React, window.ReactDOM, window.firebase, window.LucideReact);
    </script>
</body>
</html>
