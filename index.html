<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProcureDesk | Project elev8-be0f4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: #f8fafc; color: #1e293b; overflow: hidden; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #root:empty { display: flex; align-items: center; justify-content: center; height: 100vh; background: #0f172a; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root">
        <div style="text-align: center; color: white; font-family: sans-serif;">
            <div style="width: 40px; height: 40px; border: 3px solid #334155; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px;"></div>
            <p style="font-size: 14px; font-weight: 600; letter-spacing: 0.05em;">SYNCHRONIZING FINANCIAL DATA...</p>
        </div>
    </div>
    <style> @keyframes spin { to { transform: rotate(360deg); } } </style>

    <script type="text/babel">
        var useState = window.React.useState;
        var useEffect = window.React.useEffect;
        var useMemo = window.React.useMemo;
        var Icons = window.LucideReact || {};

        var firebaseConfig = {
            apiKey: "AIzaSyACvR7KEzJs719E0JJtFiDpiZk0kHYnQyE",
            authDomain: "elev8-be0f4.firebaseapp.com",
            projectId: "elev8-be0f4",
            storageBucket: "elev8-be0f4.firebasestorage.app",
            messagingSenderId: "939507136986",
            appId: "1:939507136986:web:8a8d417cbbc80921eda8e3"
        };

        var APP_ID = 'my-procurement-app';
        var TODAY = new Date('2026-03-24');

        function App() {
            var [activeTab, setActiveTab] = useState('dashboard');
            var [user, setUser] = useState(null);
            var [purchases, setPurchases] = useState([]);
            var [apvs, setApvs] = useState([]);
            var [weeklyFund, setWeeklyFund] = useState(0);
            var [isAdmin, setIsAdmin] = useState(false);
            var [isLoading, setIsLoading] = useState(true);
            var [showAdminLogin, setShowAdminLogin] = useState(false);
            var [adminPassword, setAdminPassword] = useState('');

            // Modals & Form State
            var [isPoModalOpen, setIsPoModalOpen] = useState(false);
            var [isApvModalOpen, setIsApvModalOpen] = useState(false);
            var [isFundModalOpen, setIsFundModalOpen] = useState(false);
            
            var [newPo, setNewPo] = useState({ id: '', vendor: '', amount: '', description: '', prReceivedDate: '', poDate: '', expectedDelivery: '', personnel: '' });
            var [newApv, setNewApv] = useState({ id: '', poId: '', vendor: '', invoiceDate: '', dueDate: '', amount: '' });
            var [fundInput, setFundInput] = useState('');

            useEffect(function() {
                if (!window.firebase.apps.length) window.firebase.initializeApp(firebaseConfig);
                var auth = window.firebase.auth();
                var db = window.firebase.firestore();

                return auth.onAuthStateChanged(async function(u) {
                    if (!u) {
                        try { await auth.signInAnonymously(); } catch(e) { console.error("Auth failed"); }
                    } else {
                        setUser(u);
                        var baseRef = db.collection('artifacts').doc(APP_ID).collection('public').doc('data');
                        
                        baseRef.collection('purchases').onSnapshot(snap => {
                            setPurchases(snap.docs.map(d => ({id: d.id, ...d.data()})));
                        });

                        baseRef.collection('apvs').onSnapshot(snap => {
                            setApvs(snap.docs.map(d => ({id: d.id, ...d.data()})));
                            setIsLoading(false);
                        });

                        baseRef.collection('settings').doc('treasury').onSnapshot(doc => {
                            if (doc.exists) {
                                var amt = doc.data().amount;
                                setWeeklyFund(amt);
                                setFundInput(amt.toString());
                            } else {
                                // Default first time
                                baseRef.collection('settings').doc('treasury').set({ amount: 5000000 });
                            }
                        });
                    }
                });
            }, []);

            var formatCurrency = (amt) => new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP' }).format(amt);

            var getAgingCategory = (dueDate) => {
                var due = new Date(dueDate);
                var diffDays = Math.ceil((TODAY - due) / (1000 * 60 * 60 * 24));
                if (diffDays <= 0) return 'Current';
                if (diffDays <= 30) return '1-30 Days';
                if (diffDays <= 60) return '31-60 Days';
                return '60+ Days';
            };

            var metrics = useMemo(function() {
                var aging = { 'Current': 0, '1-30 Days': 0, '31-60 Days': 0, '60+ Days': 0 };
                var unpaidTotal = 0;
                var fundedUnpaid = 0;

                apvs.forEach(a => {
                    if (a.status !== 'Paid') {
                        var cat = getAgingCategory(a.dueDate);
                        aging[cat] += Number(a.amount || 0);
                        unpaidTotal += Number(a.amount || 0);
                        if (a.funded) fundedUnpaid += Number(a.amount || 0);
                    }
                });

                // Personnel Lead Time (PR to PO)
                var personnelStats = {};
                purchases.forEach(p => {
                    if (p.prReceivedDate && p.poDate) {
                        var name = p.personnel || 'Other';
                        if (!personnelStats[name]) personnelStats[name] = { totalDays: 0, count: 0 };
                        var start = new Date(p.prReceivedDate);
                        var end = new Date(p.poDate);
                        var diff = Math.ceil((end - start) / (1000 * 60 * 60 * 24));
                        personnelStats[name].totalDays += diff;
                        personnelStats[name].count += 1;
                    }
                });

                var personnelList = Object.keys(personnelStats).map(name => ({
                    name: name,
                    avg: (personnelStats[name].totalDays / personnelStats[name].count).toFixed(1)
                })).sort((a,b) => a.avg - b.avg);

                var poWithDates = purchases.filter(p => p.prReceivedDate && p.poDate);
                var totalLT = poWithDates.reduce((acc, p) => {
                    var pr = new Date(p.prReceivedDate);
                    var po = new Date(p.poDate);
                    return acc + Math.ceil((po - pr) / (1000 * 60 * 60 * 24));
                }, 0);
                var avgLT = poWithDates.length > 0 ? (totalLT / poWithDates.length).toFixed(1) : '0';

                var delivered = purchases.filter(p => p.receivedDate && p.expectedDelivery);
                var onTime = delivered.filter(p => new Date(p.receivedDate) <= new Date(p.expectedDelivery)).length;
                var onTimeRate = delivered.length > 0 ? Math.round((onTime / delivered.length) * 100) : 0;

                return { aging, unpaidTotal, fundedUnpaid, avgLT, onTimeRate, personnelList };
            }, [apvs, purchases]);

            var handleAddPo = async (e) => {
                e.preventDefault();
                await window.firebase.firestore().collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('purchases').doc(newPo.id).set({
                    ...newPo, amount: Number(newPo.amount), receivedDate: null, status: 'Pending'
                });
                setIsPoModalOpen(false);
                setNewPo({ id: '', vendor: '', amount: '', description: '', prReceivedDate: '', poDate: '', expectedDelivery: '', personnel: '' });
            };

            var handleAddApv = async (e) => {
                e.preventDefault();
                await window.firebase.firestore().collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('apvs').doc(newApv.id).set({
                    ...newApv, amount: Number(newApv.amount), status: 'Unpaid', funded: false
                });
                setIsApvModalOpen(false);
                setNewApv({ id: '', poId: '', vendor: '', amount: '', invoiceDate: '', dueDate: '' });
            };

            var handleUpdateFund = async (e) => {
                e.preventDefault();
                await window.firebase.firestore().collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('settings').doc('treasury').set({
                    amount: Number(fundInput)
                });
                setIsFundModalOpen(false);
            };

            var markReceived = async (po) => {
                if (!isAdmin) return;
                var date = prompt("Enter Received Date (YYYY-MM-DD)", TODAY.toISOString().split('T')[0]);
                if (date) await window.firebase.firestore().collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('purchases').doc(po.id).update({ receivedDate: date, status: 'Received' });
            };

            var toggleFunded = async (apv) => {
                if (!isAdmin) return;
                await window.firebase.firestore().collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('apvs').doc(apv.id).update({ funded: !apv.funded });
            };

            var deleteRecord = async (col, id) => {
                if (!isAdmin || !confirm("Delete this record?")) return;
                await window.firebase.firestore().collection('artifacts').doc(APP_ID).collection('public').doc('data').collection(col).doc(id).delete();
            };

            if (isLoading) return null;

            var Icon = (props) => {
                var Comp = props.icon;
                return Comp ? <Comp size={props.size || 20} className={props.className} /> : null;
            };

            return (
                <div className="flex h-screen overflow-hidden text-slate-900 bg-slate-50">
                    {/* Sidebar */}
                    <aside className="w-64 bg-slate-900 p-8 flex flex-col hidden md:flex shrink-0">
                        <div className="mb-10 flex items-center text-white font-black text-xl tracking-tight">
                            <Icon icon={Icons.TrendingUp} className="mr-3 text-blue-500" /> ProcureDesk
                        </div>
                        <nav className="space-y-1 flex-1">
                            {[
                                { id: 'dashboard', label: 'Dashboard', icon: Icons.LayoutDashboard },
                                { id: 'purchases', label: 'PO Monitoring', icon: Icons.ShoppingCart },
                                { id: 'apvs', label: 'APV Aging', icon: Icons.Clock },
                                { id: 'analysis', label: 'Performance', icon: Icons.BarChart3 }
                            ].map(t => (
                                <button key={t.id} onClick={() => setActiveTab(t.id)} className={`w-full flex items-center px-5 py-3 rounded-2xl transition-all font-semibold ${activeTab === t.id ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/20' : 'text-slate-400 hover:bg-slate-800'}`}>
                                    <Icon icon={t.icon} className="mr-3" size={18} /> {t.label}
                                </button>
                            ))}
                        </nav>
                        <div className="mt-auto pt-6 border-t border-slate-800">
                            {!isAdmin ? (
                                <button onClick={() => setShowAdminLogin(true)} className="w-full py-3 bg-blue-600/10 text-blue-400 border border-blue-900/50 rounded-xl text-[10px] font-bold uppercase tracking-widest">Admin Unlock</button>
                            ) : (
                                <button onClick={() => setIsAdmin(false)} className="w-full py-3 bg-emerald-600/10 text-emerald-400 border border-emerald-900/50 rounded-xl text-[10px] font-bold uppercase">Super User Active</button>
                            )}
                        </div>
                    </aside>

                    {/* Main Area */}
                    <main className="flex-1 p-6 md:p-10 overflow-y-auto w-full">
                        <header className="flex flex-col md:flex-row justify-between md:items-center mb-8 gap-4">
                            <div>
                                <h2 className="text-3xl font-black tracking-tight capitalize">{activeTab.replace('-',' ')}</h2>
                                <p className="text-slate-400 text-xs font-bold uppercase tracking-widest mt-1">Live Environment • {TODAY.toDateString()}</p>
                            </div>
                            {isAdmin && (
                                <div className="flex gap-2">
                                    <button onClick={() => setIsPoModalOpen(true)} className="px-5 py-2.5 bg-blue-600 text-white rounded-xl text-xs font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all">+ NEW PURCHASE</button>
                                    <button onClick={() => setIsApvModalOpen(true)} className="px-5 py-2.5 bg-slate-800 text-white rounded-xl text-xs font-bold shadow-lg shadow-slate-200 hover:bg-slate-900 transition-all">+ NEW APV</button>
                                </div>
                            )}
                        </header>

                        {activeTab === 'dashboard' && (
                            <div className="space-y-6 animate-in">
                                {/* Fund Status Header with Clear Input Access */}
                                <div className="bg-slate-900 rounded-[2.5rem] p-10 text-white relative overflow-hidden shadow-2xl">
                                    <div className="relative z-10">
                                        <div className="flex flex-col md:flex-row justify-between md:items-center gap-6">
                                            <div>
                                                <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-3 flex items-center">
                                                    <Icon icon={Icons.Wallet} size={14} className="mr-2 text-blue-500" /> Treasury Fund Allocation
                                                </p>
                                                <h3 className="text-5xl font-black tracking-tighter">{formatCurrency(weeklyFund - metrics.fundedUnpaid)}</h3>
                                                <p className="text-blue-400 text-[10px] font-bold mt-2 uppercase">Remaining Liquidity for Purchasing</p>
                                            </div>
                                            {isAdmin && (
                                                <button 
                                                    onClick={() => setIsFundModalOpen(true)} 
                                                    className="px-6 py-4 bg-white/10 hover:bg-white/20 border border-white/20 rounded-2xl flex items-center gap-3 transition-all"
                                                >
                                                    <Icon icon={Icons.Edit3} size={20} className="text-blue-400" />
                                                    <div className="text-left">
                                                        <div className="text-[10px] font-bold uppercase opacity-60">Treasury Control</div>
                                                        <div className="text-sm font-bold">SET WEEKLY BUDGET</div>
                                                    </div>
                                                </button>
                                            )}
                                        </div>
                                        <div className="mt-10 flex flex-wrap gap-3">
                                            <div className="px-4 py-2 bg-white/5 rounded-full border border-white/10 text-[10px] font-bold uppercase">Weekly Allocation: {formatCurrency(weeklyFund)}</div>
                                            <div className="px-4 py-2 bg-amber-500/10 rounded-full border border-amber-500/20 text-[10px] font-bold uppercase text-amber-400">Earmarked: {formatCurrency(metrics.fundedUnpaid)}</div>
                                            <div className="px-4 py-2 bg-rose-500/10 rounded-full border border-rose-500/20 text-[10px] font-bold uppercase text-rose-400">Total Outstanding: {formatCurrency(metrics.unpaidTotal)}</div>
                                        </div>
                                    </div>
                                    <div className="absolute top-0 right-0 p-12 opacity-5"><Icon icon={Icons.TrendingUp} size={300} /></div>
                                </div>

                                {/* Monitoring Row */}
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm flex items-center justify-between">
                                        <div className="flex-1">
                                            <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-1">Avg PR-to-PO Cycle</p>
                                            <h4 className="text-3xl font-black text-slate-800">{metrics.avgLT} Days</h4>
                                            <div className="mt-4 space-y-1">
                                                {metrics.personnelList.slice(0, 2).map((p, idx) => (
                                                    <div key={idx} className="flex justify-between text-[10px] font-bold text-slate-400 border-t border-slate-50 pt-2">
                                                        <span className="truncate mr-2 uppercase">{p.name}</span>
                                                        <span className="text-blue-600 shrink-0">{p.avg}d avg</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="p-4 bg-blue-50 text-blue-600 rounded-2xl ml-6"><Icon icon={Icons.Timer} size={28}/></div>
                                    </div>
                                    <div className="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm flex items-center justify-between">
                                        <div>
                                            <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-1">On-Time Delivery Rate</p>
                                            <h4 className="text-3xl font-black text-emerald-600">{metrics.onTimeRate}%</h4>
                                            <p className="text-[10px] text-slate-400 mt-1 uppercase font-bold tracking-tight italic">Supplier performance index</p>
                                        </div>
                                        <div className="p-4 bg-emerald-50 text-emerald-600 rounded-2xl"><Icon icon={Icons.Truck} size={28}/></div>
                                    </div>
                                </div>

                                {/* Aging Row */}
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                    {Object.entries(metrics.aging).map(([cat, val]) => (
                                        <div key={cat} className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                                            <p className="text-slate-400 text-[9px] font-bold uppercase tracking-widest mb-1">{cat} Aging</p>
                                            <h4 className={`text-xl font-black ${val > 0 && cat !== 'Current' ? 'text-rose-600' : 'text-slate-800'}`}>{formatCurrency(val)}</h4>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'purchases' && (
                            <div className="bg-white rounded-[2.5rem] border border-slate-100 shadow-sm overflow-hidden animate-in">
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 border-b border-slate-100">
                                            <tr className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                                                <th className="px-6 py-5">PO / Processor</th>
                                                <th className="px-6 py-5">PR vs PO Leadtime</th>
                                                <th className="px-6 py-5">Delivery Details</th>
                                                <th className="px-6 py-5 text-right">Amount</th>
                                                {isAdmin && <th className="px-6 py-5"></th>}
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50">
                                            {purchases.map(p => (
                                                <tr key={p.id} className="hover:bg-slate-50/50 transition-colors text-sm">
                                                    <td className="px-6 py-5">
                                                        <div className="font-bold text-blue-600">{p.id}</div>
                                                        <div className="text-[10px] text-slate-400 font-bold uppercase mt-1 flex items-center">
                                                            <Icon icon={Icons.User} size={10} className="mr-1" /> {p.personnel || 'Other'}
                                                        </div>
                                                    </td>
                                                    <td className="px-6 py-5">
                                                        <div className="font-bold text-slate-700 text-sm truncate max-w-[150px]">{p.vendor}</div>
                                                        <div className="text-[9px] text-slate-400 uppercase font-bold mt-1">PR: {p.prReceivedDate} → PO: {p.poDate}</div>
                                                    </td>
                                                    <td className="px-6 py-5">
                                                        {p.receivedDate ? (
                                                            <div className="flex items-center text-emerald-600 text-[10px] font-bold uppercase">
                                                                <Icon icon={Icons.CheckCircle} size={14} className="mr-1.5" /> Received {p.receivedDate}
                                                            </div>
                                                        ) : (
                                                            <div className="flex items-center">
                                                                <span className="text-amber-500 text-[10px] font-bold uppercase">Due {p.expectedDelivery || 'N/A'}</span>
                                                                {isAdmin && <button onClick={() => markReceived(p)} className="ml-3 text-[9px] text-blue-600 underline font-bold uppercase tracking-tighter">Receive</button>}
                                                            </div>
                                                        )}
                                                    </td>
                                                    <td className="px-6 py-5 text-right font-black text-slate-900">{formatCurrency(p.amount)}</td>
                                                    {isAdmin && <td className="px-6 py-5 text-right"><button onClick={() => deleteRecord('purchases', p.id)} className="text-slate-200 hover:text-rose-500 transition-colors"><Icon icon={Icons.Trash2} size={16}/></button></td>}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'apvs' && (
                            <div className="bg-white rounded-[2.5rem] border border-slate-100 shadow-sm overflow-hidden animate-in">
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 border-b border-slate-100">
                                            <tr className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                                                <th className="px-8 py-5">APV Ref</th>
                                                <th className="px-8 py-5">Vendor & Deadline</th>
                                                <th className="px-8 py-5 text-center">Aging & Funding</th>
                                                <th className="px-8 py-5 text-right">Amount</th>
                                                {isAdmin && <th className="px-8 py-5"></th>}
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50">
                                            {apvs.map(a => {
                                                var cat = getAgingCategory(a.dueDate);
                                                return (
                                                    <tr key={a.id} className="hover:bg-slate-50/50 transition-colors text-sm">
                                                        <td className="px-8 py-5 font-bold text-slate-700">{a.id}</td>
                                                        <td className="px-8 py-5">
                                                            <div className="font-bold text-slate-700">{a.vendor}</div>
                                                            <div className="text-[9px] text-slate-400 uppercase font-bold mt-1">Due: {a.dueDate}</div>
                                                        </td>
                                                        <td className="px-8 py-5 text-center">
                                                            <div className="flex flex-col items-center gap-2">
                                                                <span className={`px-2.5 py-1 rounded-lg text-[9px] font-bold uppercase ${cat === 'Current' ? 'bg-slate-100 text-slate-500' : 'bg-rose-100 text-rose-600'}`}>{cat}</span>
                                                                <button 
                                                                    onClick={() => toggleFunded(a)}
                                                                    className={`px-3 py-1 rounded-full text-[9px] font-bold border transition-all ${a.funded ? 'bg-emerald-50 text-emerald-600 border-emerald-100 shadow-sm shadow-emerald-100' : 'bg-slate-50 text-slate-400 border-slate-200'}`}
                                                                >
                                                                    {a.funded ? 'FUNDED' : 'PENDING FUND'}
                                                                </button>
                                                            </div>
                                                        </td>
                                                        <td className="px-8 py-5 text-right font-black text-slate-900">{formatCurrency(a.amount)}</td>
                                                        {isAdmin && <td className="px-8 py-5 text-right"><button onClick={() => deleteRecord('apvs', a.id)} className="text-slate-200 hover:text-rose-500 transition-colors"><Icon icon={Icons.Trash2} size={16}/></button></td>}
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                        
                        {activeTab === 'analysis' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 animate-in">
                                <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                                    <h3 className="font-bold text-slate-800 mb-6 flex items-center">
                                        <Icon icon={Icons.Users} size={18} className="mr-2 text-blue-500" /> Lead Time by Personnel
                                    </h3>
                                    <div className="space-y-6">
                                        {metrics.personnelList.length === 0 ? (
                                            <p className="text-xs text-slate-400 italic">No cycle data recorded yet.</p>
                                        ) : metrics.personnelList.map((p, idx) => (
                                            <div key={idx} className="space-y-2">
                                                <div className="flex justify-between text-[10px] font-bold uppercase">
                                                    <span className="text-slate-400">{p.name}</span>
                                                    <span className="text-slate-700">{p.avg} Days Avg</span>
                                                </div>
                                                <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                                    <div 
                                                        className={`h-full bg-blue-500 transition-all duration-700`} 
                                                        style={{ width: `${Math.min((Number(p.avg) / 14) * 100, 100)}%` }}
                                                    ></div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="bg-indigo-900 p-8 rounded-[2.5rem] text-white flex flex-col justify-center shadow-xl relative overflow-hidden">
                                    <div className="relative z-10">
                                        <Icon icon={Icons.Sparkles} size={32} className="text-indigo-300 mb-4" />
                                        <h3 className="text-xl font-bold mb-2">Cycle Time Analysis</h3>
                                        <p className="text-indigo-200 text-sm leading-relaxed">
                                            The overall average lead time is currently <strong>{metrics.avgLT} days</strong>. 
                                            System tracks performance from PR received to PO issuance. Add personnel names to POs to track individual turnaround efficiency.
                                        </p>
                                    </div>
                                    <Icon icon={Icons.Activity} size={200} className="absolute -right-10 -bottom-10 opacity-5" />
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Admin Access Modal */}
                    {showAdminLogin && (
                        <div className="fixed inset-0 z-50 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white rounded-[3rem] p-10 w-full max-sm animate-in shadow-2xl">
                                <h3 className="text-2xl font-black text-center mb-6 tracking-tight">Super User Access</h3>
                                <form onSubmit={e => { e.preventDefault(); if(adminPassword==='admin123'){setIsAdmin(true); setShowAdminLogin(false); setAdminPassword('');} else alert("Access Denied");}} className="space-y-6">
                                    <input type="password" autoFocus value={adminPassword} onChange={e => setAdminPassword(e.target.value)} className="w-full p-5 bg-slate-50 rounded-2xl text-center text-2xl font-bold focus:bg-white outline-none border border-transparent focus:border-blue-500 transition-all" placeholder="••••" />
                                    <button className="w-full py-5 bg-slate-900 text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl">Unlock Dashboard</button>
                                    <button type="button" onClick={() => setShowAdminLogin(false)} className="w-full text-slate-400 text-xs font-bold uppercase mt-4 text-center">Cancel</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Weekly Fund Management Modal */}
                    {isFundModalOpen && (
                        <div className="fixed inset-0 z-50 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4">
                            <form onSubmit={handleUpdateFund} className="bg-white rounded-[2.5rem] p-10 w-full max-w-sm space-y-6 shadow-2xl animate-in">
                                <div className="text-center">
                                    <div className="bg-blue-50 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 text-blue-600">
                                        <Icon icon={Icons.Wallet} size={32} />
                                    </div>
                                    <h3 className="text-2xl font-black text-slate-800 tracking-tight">Treasury Allocation</h3>
                                    <p className="text-slate-400 text-sm font-medium mt-1">Set the total fund for this cycle</p>
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase ml-2 tracking-widest">Amount (PHP)</label>
                                    <input required type="number" placeholder="Enter amount..." value={fundInput} onChange={e => setFundInput(e.target.value)} className="w-full p-5 bg-slate-50 rounded-2xl text-center text-2xl font-bold focus:bg-white outline-none border border-transparent focus:border-blue-500 transition-all" />
                                </div>
                                <div className="flex flex-col gap-3">
                                    <button className="w-full py-5 bg-blue-600 text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl shadow-blue-200 hover:bg-blue-700 transition-all">Update Funds</button>
                                    <button type="button" onClick={() => setIsFundModalOpen(false)} className="w-full py-2 text-slate-400 text-xs font-bold uppercase tracking-widest text-center">Cancel</button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* PO Monitoring Modal */}
                    {isPoModalOpen && (
                        <div className="fixed inset-0 z-50 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4">
                            <form onSubmit={handleAddPo} className="bg-white rounded-[2.5rem] p-8 w-full max-w-lg space-y-4 shadow-2xl animate-in max-h-[90vh] overflow-y-auto">
                                <div className="flex justify-between items-center mb-2">
                                    <h3 className="text-xl font-bold text-slate-800 tracking-tight">Purchase Entry & Personnel</h3>
                                    <button type="button" onClick={() => setIsPoModalOpen(false)}><Icon icon={Icons.X} size={20} className="text-slate-400"/></button>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-1 col-span-2">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">PO Reference</label>
                                        <input required placeholder="PO-2026-XXXX" value={newPo.id} onChange={e => setNewPo({...newPo, id: e.target.value})} className="w-full p-4 bg-slate-50 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">PR Received Date</label>
                                        <input required type="date" value={newPo.prReceivedDate} onChange={e => setNewPo({...newPo, prReceivedDate: e.target.value})} className="w-full p-4 bg-slate-50 rounded-xl outline-none text-sm" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">PO Issuance Date</label>
                                        <input required type="date" value={newPo.poDate} onChange={e => setNewPo({...newPo, poDate: e.target.value})} className="w-full p-4 bg-slate-50 rounded-xl outline-none text-sm" />
                                    </div>
                                    <div className="space-y-1 col-span-2">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">Vendor Name</label>
                                        <input required placeholder="Supplier Name" value={newPo.vendor} onChange={e => setNewPo({...newPo, vendor: e.target.value})} className="w-full p-4 bg-slate-50 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">Purchasing Personnel</label>
                                        <input required placeholder="Processor Name" value={newPo.personnel} onChange={e => setNewPo({...newPo, personnel: e.target.value})} className="w-full p-4 bg-slate-50 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">Amount</label>
                                        <input required type="number" placeholder="0.00" value={newPo.amount} onChange={e => setNewPo({...newPo, amount: e.target.value})} className="w-full p-4 bg-slate-50 rounded-xl outline-none text-sm" />
                                    </div>
                                    <div className="space-y-1 col-span-2">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">Expected Delivery</label>
                                        <input required type="date" value={newPo.expectedDelivery} onChange={e => setNewPo({...newPo, expectedDelivery: e.target.value})} className="w-full p-4 bg-slate-50 rounded-xl outline-none text-sm" />
                                    </div>
                                </div>
                                <button className="w-full py-4 bg-blue-600 text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl shadow-blue-200 transition-all hover:bg-blue-700">Save Record</button>
                            </form>
                        </div>
                    )}

                    {/* APV Modal */}
                    {isApvModalOpen && (
                        <div className="fixed inset-0 z-50 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4">
                            <form onSubmit={handleAddApv} className="bg-white rounded-[2.5rem] p-8 w-full max-w-lg space-y-4 shadow-2xl animate-in">
                                <div className="flex justify-between items-center mb-2">
                                    <h3 className="text-xl font-bold text-slate-800 tracking-tight">New Payable Entry</h3>
                                    <button type="button" onClick={() => setIsApvModalOpen(false)}><Icon icon={Icons.X} size={20} className="text-slate-400"/></button>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">APV Ref</label>
                                        <input required placeholder="APV-XXXX" value={newApv.id} onChange={e => setNewApv({...newApv, id: e.target.value})} className="w-full p-4 bg-slate-50 rounded-xl outline-none text-sm" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">Linked PO</label>
                                        <input required placeholder="PO-XXXX" value={newApv.poId} onChange={e => setNewApv({...newApv, poId: e.target.value})} className="w-full p-4 bg-slate-50 rounded-xl outline-none text-sm" />
                                    </div>
                                    <div className="space-y-1 col-span-2">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">Vendor</label>
                                        <input required placeholder="Supplier Name" value={newApv.vendor} onChange={e => setNewApv({...newApv, vendor: e.target.value})} className="w-full p-4 bg-slate-50 rounded-xl outline-none text-sm" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">Due Date</label>
                                        <input required type="date" value={newApv.dueDate} onChange={e => setNewApv({...newApv, dueDate: e.target.value})} className="w-full p-4 bg-slate-50 rounded-xl outline-none text-sm" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">Amount</label>
                                        <input required type="number" placeholder="0.00" value={newApv.amount} onChange={e => setNewApv({...newApv, amount: e.target.value})} className="w-full p-4 bg-slate-50 rounded-xl outline-none text-sm" />
                                    </div>
                                </div>
                                <button className="w-full py-4 bg-slate-800 text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl transition-all hover:bg-slate-900">Log Payable</button>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        var root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
</body>
</html>
